<style>
:root{
  --ink:#11141A; --panel:#181D26; --panel2:#202734; --line:#2A3242;
  --text:#E9ECF1; --mut:#97A0B0; --mut2:#6B7383;
  --gold:#E0A45A; --gold-soft:rgba(224,164,90,.13);
  --e:#5B8DEF; --a:#9B7BE8; --r:#E0A45A; --av:#58B97E;
  --danger:#E06C6C;
  --rad:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--ink);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;color:var(--text);background:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:14px;outline:none}
input:focus,select:focus{border-color:var(--gold)}
::selection{background:var(--gold-soft)}
.app{display:flex;min-height:100vh}
/* ---------- sidebar ---------- */
.side{width:222px;flex-shrink:0;border-right:1px solid var(--line);padding:26px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px}
.brand{font-family:'Archivo',sans-serif;font-weight:800;font-size:19px;letter-spacing:.4px;padding:0 12px 4px}
.brand small{display:block;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:10.5px;color:var(--gold);letter-spacing:1.6px;margin-top:3px}
.nav{margin-top:22px;display:flex;flex-direction:column;gap:2px}
.nav button{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;font-size:13.5px;font-weight:500;color:var(--mut);text-align:left;transition:background .15s,color .15s}
.nav button:hover{color:var(--text);background:var(--panel)}
.nav button.on{color:var(--text);background:var(--panel2);font-weight:600}
.nav button.on .ic{color:var(--gold)}
.ic{width:17px;text-align:center;font-size:15px}
.sidefoot{margin-top:auto;padding:10px 12px;font-size:11.5px;color:var(--mut2);line-height:1.7}
.sidefoot b{color:var(--mut)}
/* ---------- main ---------- */
.main{flex:1;min-width:0;padding:26px 30px 90px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:26px;flex-wrap:wrap}
.topbar h1{font-family:'Archivo',sans-serif;font-weight:700;font-size:22px;letter-spacing:.2px}
.chips{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.chip{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:500;padding:6px 11px;border-radius:999px;border:1px solid var(--line);color:var(--mut)}
.chip.gold{border-color:rgba(224,164,90,.45);color:var(--gold);background:var(--gold-soft)}
/* ---------- cards ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:20px}
.card h3{font-family:'Archivo',sans-serif;font-weight:700;font-size:14.5px;letter-spacing:.3px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.lbl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:1.8px;color:var(--mut2);text-transform:uppercase}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
/* ---------- trilho 13 semanas (assinatura) ---------- */
.rail{display:flex;gap:5px;margin:14px 0 8px}
.railseg{flex:1;height:34px;border-radius:7px;background:var(--panel2);position:relative;overflow:hidden;border:1px solid var(--line)}
.railseg .fill{position:absolute;inset:0;transform-origin:left;background:currentColor;opacity:.28}
.railseg.f1{color:var(--e)} .railseg.f2{color:var(--a)} .railseg.f3{color:var(--av)}
.railseg .wn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--mut)}
.railseg.now{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.railseg.now .wn{color:var(--gold);font-weight:700}
.raillegend{display:flex;gap:16px;font-size:11px;color:var(--mut);flex-wrap:wrap}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:1px}
/* ---------- métricas ---------- */
.metric{display:flex;flex-direction:column;gap:5px}
.metric .v{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:30px;color:var(--text)}
.metric .v em{font-style:normal;font-size:15px;color:var(--mut)}
/* ---------- blocos ---------- */
.blk{display:flex;align-items:center;gap:13px;padding:12px 13px;border:1px solid var(--line);border-radius:11px;background:var(--ink);margin-bottom:9px;transition:opacity .15s}
.blk.done{opacity:.45}
.blk.done .bt{text-decoration:line-through}
.cb{width:21px;height:21px;border-radius:6px;border:1.6px solid var(--mut2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink);transition:all .12s}
.cb.on{background:var(--gold);border-color:var(--gold)}
.tag{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:1px;padding:3px 7px;border-radius:5px;flex-shrink:0}
.tag.E{background:rgba(91,141,239,.15);color:var(--e)}
.tag.A{background:rgba(155,123,232,.15);color:var(--a)}
.tag.R{background:rgba(224,164,90,.15);color:var(--r)}
.tag.AV{background:rgba(88,185,126,.15);color:var(--av)}
.bt{font-size:13.5px;font-weight:500;flex:1;min-width:0}
.bt small{display:block;color:var(--mut2);font-size:11px;font-weight:400;margin-top:1px}
/* ---------- cronograma ---------- */
.weeknav{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.weeknav .wbtn{padding:7px 13px;border:1px solid var(--line);border-radius:9px;font-size:13px;color:var(--mut)}
.weeknav .wbtn:hover{color:var(--text)}
.weektitle{font-family:'Archivo',sans-serif;font-weight:700;font-size:16px}
.weektitle small{color:var(--mut);font-weight:500;font-family:'Inter',sans-serif;font-size:12.5px;margin-left:8px}
.daygrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.daycard{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:15px}
.daycard h4{font-family:'Archivo',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;margin-bottom:11px;color:var(--mut);text-transform:uppercase}
.daycard h4 span{color:var(--text)}
.daycard.today{border-color:var(--gold)}
.daycard.today h4{color:var(--gold)}
/* ---------- kanban ---------- */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kcol{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:14px;min-height:200px}
.kcol h4{font-family:'Archivo',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;padding-bottom:9px;border-bottom:2px solid currentColor}
.kcol.cE h4{color:var(--e)} .kcol.cA h4{color:var(--a)} .kcol.cR h4{color:var(--r)} .kcol.cAV h4{color:var(--av)}
.kcard{background:var(--ink);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:9px}
.kcard .kn{font-size:12.5px;font-weight:600;margin-bottom:7px;line-height:1.45}
.kchip{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.8px;color:var(--mut);border:1px solid var(--line);border-radius:5px;padding:2px 6px;margin-bottom:7px}
.kfilter{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.kcount{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mut2);font-weight:500;margin-left:6px}
.kcard .kmove{display:flex;justify-content:space-between}
.kcard .kmove button{font-size:13px;color:var(--mut2);padding:2px 8px;border-radius:6px;border:1px solid var(--line)}
.kcard .kmove button:hover{color:var(--gold);border-color:var(--gold)}
/* ---------- barras ---------- */
.bar{height:8px;border-radius:999px;background:var(--panel2);overflow:hidden}
.bar i{display:block;height:100%;border-radius:999px;background:var(--gold)}
.row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.row .rl{width:200px;font-size:13px;font-weight:500;flex-shrink:0}
.row .rp{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--mut);width:48px;text-align:right;flex-shrink:0}
/* ---------- pomodoro ---------- */
.pomo{display:flex;flex-direction:column;align-items:center;gap:18px;padding:30px 0}
.pomotime{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:64px;letter-spacing:2px}
.pomobtns{display:flex;gap:10px}
.btn{padding:11px 22px;border-radius:10px;font-size:13.5px;font-weight:600;border:1px solid var(--line);color:var(--text);transition:all .15s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.solid{background:var(--gold);color:#1A1404;border-color:var(--gold)}
.btn.solid:hover{filter:brightness(1.08)}
.btn.sm{padding:7px 14px;font-size:12.5px}
.btn.dngr:hover{border-color:var(--danger);color:var(--danger)}
/* ---------- listas ---------- */
.qitem{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px}
.qitem:last-child{border-bottom:none}
.qitem .qd{color:var(--mut2);font-family:'JetBrains Mono',monospace;font-size:11.5px;width:78px;flex-shrink:0}
.qitem .qn{flex:1;font-weight:500}
.qitem .qs{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--mut)}
.del{color:var(--mut2);font-size:15px;padding:2px 7px}
.del:hover{color:var(--danger)}
.lsitem{display:flex;align-items:center;gap:11px;padding:8px 0;font-size:13.5px;color:var(--mut);cursor:pointer}
.lsitem:hover{color:var(--text)}
.lsitem.on{color:var(--text)}
.lsitem.on .lsc{background:var(--av);border-color:var(--av)}
.lsc{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--mut2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink)}
/* ---------- login / aviso ---------- */
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.gatebox{max-width:380px;width:100%;text-align:center;display:flex;flex-direction:column;gap:18px}
.gatebox h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:30px}
.gatebox p{color:var(--mut);font-size:14px;line-height:1.6}
.notice{background:var(--gold-soft);border:1px solid rgba(224,164,90,.4);border-radius:11px;padding:13px 15px;font-size:12.5px;color:var(--gold);line-height:1.6;margin-bottom:20px}
/* ---------- bottom nav mobile ---------- */
.bnav{display:none}
@media(max-width:920px){
  .side{display:none}
  .main{padding:20px 16px 110px}
  .grid2,.grid3,.kgrid{grid-template-columns:1fr}
  .pomotime{font-size:50px}
  .row .rl{width:130px}
  .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--line);padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:50;justify-content:space-around}
  .bnav button{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9.5px;color:var(--mut2);padding:4px 6px;border-radius:8px}
  .bnav button.on{color:var(--gold)}
  .bnav .ic{font-size:17px}
}
.pomobar{position:fixed;right:18px;bottom:18px;z-index:60;display:flex;align-items:center;gap:12px;background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:10px 14px;box-shadow:0 8px 30px rgba(0,0,0,.45)}
.pomobar .pt{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:19px;letter-spacing:1px;min-width:62px}
.pomobar .pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pomobar button{font-size:13px;color:var(--mut);padding:5px 9px;border-radius:8px;border:1px solid var(--line)}
.pomobar button:hover{color:var(--gold);border-color:var(--gold)}
@media(max-width:920px){.pomobar{right:10px;bottom:96px;left:10px;justify-content:center}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

const META = {E:"teoria 25min + ≥20 questões",A:"≥25 questões comentadas",R:"revisão ativa + ≥20 questões",AV:"bateria ≥30 questões"};

const WEEKS = {};
/* passo 1: contar quantos slots cada disciplina recebe nas NWEEKS semanas */
const _slots = {};
for (let w=1; w<=NWEEKS; w++){
  const f = phaseOf(w).n;
  for (const d of ["seg","ter","qua","qui","sex"]) ROT[f][d].forEach(b=>_slots[b[0]]=(_slots[b[0]]||0)+1);
}
/* passo 2: pré-distribuir os temas de cada disciplina pelos slots (último absorve o excedente) */
const _plan = {};   // disc -> array de strings (1 por slot), cada string pode ter 1+ temas
for (const d of Object.keys(SEQ)){
  const temas = SEQ[d], n = _slots[d]||temas.length, out = [];
  if (temas.length <= n){
    for (let i=0;i<temas.length;i++) out.push(temas[i]);          // 1 tema por slot
    while (out.length < n) out.push(temas[temas.length-1]+" · aprofundar");
  } else {
    const base = Math.floor(temas.length/n), extra = temas.length%n;
    let idx=0;
    for (let s=0;s<n;s++){ const take = base + (s>=n-extra?1:0); out.push(temas.slice(idx,idx+take).join(" + ")); idx+=take; }
  }
  _plan[d]=out;
}
const _cnt = {};
const nextTopic = d => { const i=_cnt[d]||0; _cnt[d]=i+1; return (_plan[d]&&_plan[d][i])||DISC[d].nome; };
for (let w=1; w<=NWEEKS; w++){
  const f = phaseOf(w).n, rot = ROT[f], days = {};
  for (const d of ["seg","ter","qua","qui","sex"]){
    const [b1,b2] = rot[d];
    const mk = (b,slot)=>({id:`S${w}-${d}-${slot}`, disc:b[0], eara:b[1], t:DISC[b[0]].nome, sub:`${nextTopic(b[0])} · 1h15 · ${META[b[1]]}`});
    days[d] = [ mk(b1,1), mk(b2,2),
      {id:`S${w}-${d}-3`, disc:null, eara:"R", t:"Lei seca", sub:`${LEISECA[w][d]} · 30min`},
      {id:`S${w}-${d}-4`, disc:null, eara:"R", t:"Anki", sub:"revisão diária · 30min"},
    ];
  }
  days.sab = [
    {id:`S${w}-sab-1`, disc:null, eara:"AV", t:`Simulado ${w%2===1?"Quadrix":"CEBRASPE"}`, sub:"2h30 · condições reais · 60–80 questões C/E"},
    {id:`S${w}-sab-2`, disc:null, eara:"AV", t:"Correção comentada", sub:"1h30 · cada erro vira nota + card no Anki"},
    {id:`S${w}-sab-3`, disc:null, eara:"A",  t:"Questões — disciplina mais fraca", sub:"1h · ≥30 questões · veja o Diagnóstico"},
  ];
  days.dom = [
    {id:`S${w}-dom-1`, disc:null, eara:"R", t:"Anki — revisão acumulada", sub:"1h"},
    {id:`S${w}-dom-2`, disc:null, eara:"R", t:"Lei seca da semana", sub:"releitura dos 5 trechos da semana · 45min"},
    {id:`S${w}-dom-3`, disc:null, eara:"R", t:"Fechamento do ciclo EARA", sub:"45min · mover o Kanban"},
  ];
  WEEKS[w] = days;
}
const WEEK_IDS = {}; for(let w=1;w<=NWEEKS;w++) WEEK_IDS[w]=Object.values(WEEKS[w]).flat().map(b=>b.id);

const fmt = d => d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
const weekRange = w => {const a=new Date(START.getTime()+(w-1)*7*DAY_MS); const b=new Date(a.getTime()+6*DAY_MS); return `${fmt(a)} – ${fmt(b)}`;};
function currentWeek(){const n=Math.floor((Date.now()-START.getTime())/(7*DAY_MS))+1; return Math.min(NWEEKS,Math.max(1,n));}
function todayKey(){const i=(new Date().getDay()+6)%7; return DAYS[i];}
const daysToExam = () => Math.max(0,Math.ceil((EXAM-new Date())/DAY_MS));

/* ============================================================
   PERSISTÊNCIA — Firestore (mentoros/{uid}) + espelho local
   ============================================================ */
const LS_KEY = "mentoros_v5";
function loadLocal(){ try{const r=localStorage.getItem(LS_KEY); return r?JSON.parse(r):null;}catch(e){return null;} }
function saveLocal(s){ try{localStorage.setItem(LS_KEY,JSON.stringify(s));}catch(e){} }

function useAppState(user){
  const [state,setState] = useState(()=>({...DEFAULT_STATE,...(loadLocal()||{})}));
  const [loaded,setLoaded] = useState(!FIREBASE_ON);
  const tRef = useRef(null);
  useEffect(()=>{
    if(!FIREBASE_ON||!user) return;
    db.collection("mentoros").doc(user.uid).get().then(snap=>{
      if(snap.exists) setState(s=>({...DEFAULT_STATE,...snap.data()}));
      setLoaded(true);
    }).catch(()=>setLoaded(true));
  },[user]);
  useEffect(()=>{
    saveLocal(state);
    if(!FIREBASE_ON||!user||!loaded) return;
    clearTimeout(tRef.current);
    tRef.current=setTimeout(()=>{
      db.collection("mentoros").doc(user.uid).set(state,{merge:true}).catch(()=>{});
    },800);
    return ()=>clearTimeout(tRef.current);
  },[state,user,loaded]);
  const up = useCallback(fn=>setState(s=>fn(s)),[]);
  return [state,up,loaded];
}

function Rail({state,cw}){

function Dashboard({state,up}){
  const cw=currentWeek(), tk=todayKey(), phase=phaseOf(cw);
  const today=WEEKS[cw][tk];
  const wids=WEEK_IDS[cw], wdone=wids.filter(id=>state.blocks[id]).length;
  const level=Math.floor(state.xp/250)+1;
  const weakest=useMemo(()=>{
    const agg={};
    state.questoes.forEach(q=>{if(!DISC[q.disc])return; const a=agg[q.disc]=agg[q.disc]||{t:0,c:0}; a.t+=q.total; a.c+=q.acertos;});
    let w=null,wp=2;
    Object.entries(agg).forEach(([d,a])=>{if(a.t>=10){const p=a.c/a.t; if(p<wp){wp=p;w=d;}}});
    return w?{d:w,p:Math.round(wp*100)}:null;
  },[state.questoes]);
  const toggle=id=>up(s=>{
    const on=!s.blocks[id];
    const blocks={...s.blocks}; if(on) blocks[id]=true; else delete blocks[id];
    return {...s, blocks, xp:Math.max(0,s.xp+(on?10:-10))};
  });
  return (
    <div>
      <div className="card" style={{marginBottom:16}}>
        <h3>TRILHO DA FASE v5 · SEDES <span className="lbl">{weekRange(cw)} · Semana {cw}</span></h3>
        <Rail state={state} cw={cw}/>
      </div>
      <div className="grid3" style={{marginBottom:16}}>
        <div className="card metric"><span className="lbl">Faltam para a prova</span><span className="v">D-{daysToExam()}</span><span style={{fontSize:12,color:"var(--mut)"}}>SEDES-DF · 06/09/2026 · Quadrix</span></div>
        <div className="card metric"><span className="lbl">Semana atual</span><span className="v">{wdone}<em>/{wids.length} blocos</em></span><span style={{fontSize:12,color:"var(--mut)"}}>Fase {phase.n} · {phase.nome} · {phase.mix}</span></div>
        <div className="card metric"><span className="lbl">XP · Nível {level}</span><span className="v">{state.xp}<em> xp</em></span><span style={{fontSize:12,color:"var(--mut)"}}>{state.pomos} pomodoros concluídos</span></div>
      </div>
      <div className="grid2">
        <div className="card">
          <h3>HOJE · {DAYNAME[tk]} <span className="lbl">EARA da fase: {phase.eara}</span></h3>
          {today.map(b=><Block key={b.id} b={b} done={!!state.blocks[b.id]} toggle={()=>toggle(b.id)}/>)}
        </div>
        <div className="card">
          <h3>ALVO DE SÁBADO</h3>
          {weakest ? (
            <div>
              <p style={{fontSize:13.5,color:"var(--mut)",lineHeight:1.7,marginBottom:14}}>Sua menor taxa de acerto registrada é em <b style={{color:"var(--gold)"}}>{DISC[weakest.d].nome}</b> ({weakest.p}%). É ela que entra no bloco de 1h de questões do sábado.</p>
              <div className="bar"><i style={{width:weakest.p+"%"}}></i></div>
            </div>
          ) : (
            <p style={{fontSize:13.5,color:"var(--mut)",lineHeight:1.7}}>Registre sessões na aba <b>Questões</b> (mínimo 10 questões por disciplina) e o app aponta automaticamente a disciplina mais fraca para o treino de sábado.</p>
          )}
          <div style={{marginTop:18,paddingTop:16,borderTop:"1px solid var(--line)"}}>
            <span className="lbl">Ritual diário inegociável</span>
            <p style={{fontSize:13,color:"var(--mut)",lineHeight:1.8,marginTop:8}}>Lei seca 30min · Anki 30min · 2 blocos com ≥20 questões cada (≥40/dia). Tema fechado só depois da meta de questões batida.</p>
          </div>
        </div>
      </div>
    </div>
  );
}

function Cronograma({state,up}){
  const [w,setW]=useState(currentWeek());
  const phase=phaseOf(w), tk=todayKey(), isCur=w===currentWeek();
  const toggle=id=>up(s=>{
    const on=!s.blocks[id];
    const blocks={...s.blocks}; if(on) blocks[id]=true; else delete blocks[id];
    return {...s, blocks, xp:Math.max(0,s.xp+(on?10:-10))};
  });
  return (
    <div>
      <div className="weeknav">
        <button className="wbtn" onClick={()=>setW(x=>Math.max(1,x-1))}>←</button>
        <div className="weektitle">Semana {w}<small>{weekRange(w)} · Fase {phase.n} — {phase.nome} · {phase.mix} · EARA {phase.eara}</small></div>
        <button className="wbtn" onClick={()=>setW(x=>Math.min(NWEEKS,x+1))}>→</button>
        {!isCur && <button className="wbtn" onClick={()=>setW(currentWeek())}>hoje</button>}
      </div>
      <div className="daygrid">
        {DAYS.map(d=>(
          <div key={d} className={"daycard"+(isCur&&d===tk?" today":"")}>
            <h4><span>{DAYNAME[d]}</span>{isCur&&d===tk?" · hoje":""}</h4>
            {WEEKS[w][d].map(b=><Block key={b.id} b={b} done={!!state.blocks[b.id]} toggle={()=>toggle(b.id)}/>)}
          </div>
        ))}
      </div>
    </div>
  );
}

function Kanban({state,up}){
  const [filtro,setFiltro]=useState("ALL");
  const move=(id,dir)=>up(s=>{
    const order=["E","A","R","AV"], i=order.indexOf((s.kanbanT||{})[id]||"E");
    const j=Math.min(3,Math.max(0,i+dir));
    return {...s,kanbanT:{...(s.kanbanT||{}),[id]:order[j]}};
  });
  const vis = KTOPICS.filter(k=>filtro==="ALL"||k.disc===filtro);
  const stageOf = id => (state.kanbanT||{})[id]||"E";
  return (
    <div>
      <p style={{fontSize:13.5,color:"var(--mut)",marginBottom:14,lineHeight:1.7}}>Cada tópico do cronograma é um card. No fechamento de domingo, avance o que evoluiu — tópico só chega em Avaliação quando você acerta ≥75% nas questões dele.</p>
      <div className="kfilter">
        <span className="lbl">Filtrar</span>
        <select value={filtro} onChange={e=>setFiltro(e.target.value)}>
          <option value="ALL">Todas as disciplinas ({KTOPICS.length} tópicos)</option>
          {KANBAN_DISCS.map(d=><option key={d} value={d}>{DISC[d].nome}</option>)}
        </select>
      </div>
      <div className="kgrid">
        {STAGES.map(([key,nome,cls])=>{
          const cards = vis.filter(k=>stageOf(k.id)===key);
          return (
            <div key={key} className={"kcol "+cls}>
              <h4>{nome}<span className="kcount">{cards.length}</span></h4>
              {cards.map(k=>(
                <div key={k.id} className="kcard">
                  <span className="kchip">{DISC[k.disc].nome}</span>
                  <div className="kn">{k.t}</div>
                  <div className="kmove">
                    <button onClick={()=>move(k.id,-1)} disabled={key==="E"} aria-label="Voltar estágio">←</button>
                    <button onClick={()=>move(k.id,1)} disabled={key==="AV"} aria-label="Avançar estágio">→</button>
                  </div>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Questoes({state,up}){
  const [disc,setDisc]=useState("LP");
  const [topico,setTopico]=useState(SEQ.LP[0]);
  const [total,setTotal]=useState(""); const [ac,setAc]=useState("");
  const trocaDisc=d=>{setDisc(d); setTopico(SEQ[d][0]);};
  const add=()=>{
    const t=parseInt(total),c=parseInt(ac);
    if(!t||t<1||isNaN(c)||c<0||c>t) return;
    const rec={id:Date.now(),d:new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}),disc,topico,total:t,acertos:c};
    up(s=>({...s,questoes:[rec,...s.questoes].slice(0,600),xp:s.xp+10}));
    setTotal("");setAc("");
  };
  const del=id=>up(s=>({...s,questoes:s.questoes.filter(q=>q.id!==id)}));
  return (
    <div className="grid2">
      <div className="card">
        <h3>REGISTRAR SESSÃO <span className="lbl">+10 xp</span></h3>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <div>
            <span className="lbl" style={{display:"block",marginBottom:5}}>Disciplina</span>
            <select value={disc} onChange={e=>trocaDisc(e.target.value)} style={{width:"100%"}}>
              {KANBAN_DISCS.map(d=><option key={d} value={d}>{DISC[d].nome}</option>)}
            </select>
          </div>
          <div>
            <span className="lbl" style={{display:"block",marginBottom:5}}>Tópico</span>
            <select value={topico} onChange={e=>setTopico(e.target.value)} style={{width:"100%"}}>
              {SEQ[disc].map((t,i)=><option key={i} value={t}>{t}</option>)}
            </select>
          </div>
          <div style={{display:"flex",gap:10}}>
            <input type="number" min="1" placeholder="Total de questões" value={total} onChange={e=>setTotal(e.target.value)} style={{flex:1}}/>
            <input type="number" min="0" placeholder="Acertos" value={ac} onChange={e=>setAc(e.target.value)} style={{flex:1}}/>
          </div>
          <button className="btn solid" onClick={add}>Registrar</button>
        </div>
      </div>
      <div className="card">
        <h3>ÚLTIMAS SESSÕES</h3>
        {state.questoes.length===0 && <p style={{fontSize:13,color:"var(--mut2)"}}>Nenhuma sessão ainda. Registre a primeira ao lado — é daqui que o Diagnóstico nasce.</p>}
        {state.questoes.slice(0,16).map(q=>(
          <div key={q.id} className="qitem">
            <span className="qd">{q.d}</span>
            <span className="qn">{q.topico||(DISC[q.disc]?DISC[q.disc].nome:q.disc)}<small style={{display:"block",color:"var(--mut2)",fontSize:10.5,fontWeight:400}}>{DISC[q.disc]?DISC[q.disc].nome:q.disc}</small></span>
            <span className="qs">{q.acertos}/{q.total} · {Math.round(q.acertos/q.total*100)}%</span>
            <button className="del" onClick={()=>del(q.id)} aria-label="Excluir registro">×</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function Diagnostico({state}){
  const agg=useMemo(()=>{
    const a={};
    state.questoes.forEach(q=>{if(!DISC[q.disc])return; const x=a[q.disc]=a[q.disc]||{t:0,c:0}; x.t+=q.total; x.c+=q.acertos;});
    return Object.entries(a).map(([d,x])=>({d,t:x.t,p:Math.round(x.c/x.t*100)})).sort((m,n)=>m.p-n.p);
  },[state.questoes]);
  const topErr=useMemo(()=>{
    const a={};
    state.questoes.forEach(q=>{ if(!q.topico||!DISC[q.disc]) return; const k=q.disc+"|"+q.topico; const x=a[k]=a[k]||{disc:q.disc,topico:q.topico,t:0,c:0}; x.t+=q.total; x.c+=q.acertos;});
    return Object.values(a).filter(x=>x.t>=10).map(x=>({...x,p:Math.round(x.c/x.t*100)})).sort((m,n)=>m.p-n.p).slice(0,8);
  },[state.questoes]);
  if(agg.length===0) return <div className="card"><p style={{fontSize:13.5,color:"var(--mut)",lineHeight:1.7}}>Sem dados ainda. O Diagnóstico se constrói com os registros da aba Questões — a partir de 10 questões por tópico ele já aponta onde você erra mais.</p></div>;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div className="card">
      <h3>TAXA DE ACERTO POR DISCIPLINA <span className="lbl">ordenado da mais fraca</span></h3>
      {agg.map((x,i)=>(
        <div key={x.d} className="row">
          <span className="rl" style={i===0&&x.t>=10?{color:"var(--gold)",fontWeight:700}:{}}>{DISC[x.d]?DISC[x.d].nome:x.d}{i===0&&x.t>=10?" ◄ alvo":""}</span>
          <div className="bar" style={{flex:1}}><i style={{width:x.p+"%",background:x.p<60?"var(--danger)":x.p<75?"var(--gold)":"var(--av)"}}></i></div>
          <span className="rp">{x.p}%</span>
        </div>
      ))}
      <p style={{fontSize:12,color:"var(--mut2)",marginTop:10}}>Banca C/E pune o chute: abaixo de 60% em vermelho, 60–74% em âmbar, 75%+ em verde. Amostras pequenas (&lt;10 questões) distorcem o percentual.</p>
    </div>
    <div className="card">
      <h3>TÓPICOS MAIS FRACOS <span className="lbl">≥10 questões · onde atacar</span></h3>
      {topErr.length===0
        ? <p style={{fontSize:13,color:"var(--mut2)",lineHeight:1.7}}>Registre ao menos 10 questões num mesmo tópico para ele aparecer aqui. É esta lista que torna o rastreio de erro objetivo — tópico, não disciplina.</p>
        : topErr.map((x,i)=>(
          <div key={i} className="row">
            <span className="rl" style={{width:260}}>{x.topico}<small style={{display:"block",color:"var(--mut2)",fontSize:10.5}}>{DISC[x.disc].nome}</small></span>
            <div className="bar" style={{flex:1}}><i style={{width:x.p+"%",background:x.p<60?"var(--danger)":x.p<75?"var(--gold)":"var(--av)"}}></i></div>
            <span className="rp">{x.p}%</span>
          </div>
        ))}
    </div>
    </div>
  );
}

function LeiSeca({state,up}){
  const toggle=(lei,idx)=>up(s=>{
    const cur={...(s.leiseca[lei]||{})};
    if(cur[idx]) delete cur[idx]; else cur[idx]=true;
    return {...s,leiseca:{...s.leiseca,[lei]:cur}};
  });
  return (
    <div className="grid2">
      {LEIS.map(l=>{
        const done=Object.keys(state.leiseca[l.id]||{}).length, pct=Math.round(done/l.itens.length*100);
        return (
          <div key={l.id} className="card">
            <h3>{l.nome.toUpperCase()} <span className="lbl">{pct}%</span></h3>
            <div className="bar" style={{marginBottom:14}}><i style={{width:pct+"%"}}></i></div>
            {l.itens.map((it,i)=>{
              const on=!!(state.leiseca[l.id]||{})[i];
              return (
                <div key={i} className={"lsitem"+(on?" on":"")} onClick={()=>toggle(l.id,i)}>
                  <span className="lsc">{on?"✓":""}</span>{it}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

/* hook global — vive no App, sobrevive à troca de abas */
function usePomodoro(up){
  const [mins,setMins]=useState(25);
  const [left,setLeft]=useState(25*60);
  const [run,setRun]=useState(false);
  const [mode,setMode]=useState("foco");
  const iRef=useRef(null);
  useEffect(()=>{
    if(!run){clearInterval(iRef.current);return;}
    iRef.current=setInterval(()=>setLeft(l=>{
      if(l<=1){
        if(mode==="foco"){ up(s=>({...s,xp:s.xp+15,pomos:s.pomos+1})); setMode("pausa"); return 5*60; }
        setMode("foco"); return mins*60;
      }
      return l-1;
    }),1000);
    return ()=>clearInterval(iRef.current);
  },[run,mode,mins,up]);
  const reset=useCallback(()=>{setRun(false);setMode("foco");setLeft(mins*60);},[mins]);
  const pick=useCallback(m=>{setMins(m); if(!run&&mode==="foco") setLeft(m*60);},[run,mode]);
  return {mins,left,run,mode,setRun,reset,pick};
}

function PomodoroBar({p}){
  if(!p.run && p.left===p.mins*60 && p.mode==="foco") return null; // só aparece após iniciar
  const mm=String(Math.floor(p.left/60)).padStart(2,"0"), ss=String(p.left%60).padStart(2,"0");
  const col=p.mode==="foco"?"var(--gold)":"var(--av)";
  return (
    <div className="pomobar">
      <span className="pdot" style={{background:col,opacity:p.run?1:.4}}></span>
      <span className="pt" style={{color:col}}>{mm}:{ss}</span>
      <button onClick={()=>p.setRun(r=>!r)}>{p.run?"Pausar":"Retomar"}</button>
      <button onClick={p.reset}>Zerar</button>
    </div>
  );
}

function Pomodoro({pomo}){
  const p=pomo;
  const mm=String(Math.floor(p.left/60)).padStart(2,"0"), ss=String(p.left%60).padStart(2,"0");
  return (
    <div className="card pomo">
      <span className="lbl">{p.mode==="foco"?"Bloco de foco":"Pausa"} · ciclo completo = +15 xp</span>
      <div className="pomotime" style={{color:p.mode==="foco"?"var(--text)":"var(--av)"}}>{mm}:{ss}</div>
      <div className="pomobtns">
        <button className="btn solid" onClick={()=>p.setRun(r=>!r)}>{p.run?"Pausar":"Iniciar"}</button>
        <button className="btn" onClick={p.reset}>Zerar</button>
      </div>
      <div style={{display:"flex",gap:8}}>
        {[25,50,75].map(m=>(
          <button key={m} className="btn sm" style={p.mins===m?{borderColor:"var(--gold)",color:"var(--gold)"}:{}}
            onClick={()=>p.pick(m)}>{m===75?"1h15 (bloco)":m+"min"}</button>
        ))}
      </div>
      <p style={{fontSize:12,color:"var(--mut2)",marginTop:4}}>O tempo continua rodando quando você troca de aba — a barrinha no canto mostra o andamento.</p>
    </div>
  );
}

function Ajustes({state,user}){
  const baixar=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`mentoros-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  };
  return (
    <div className="card" style={{maxWidth:480}}>
      <h3>CONTA E BACKUP</h3>
      <p style={{fontSize:13,color:"var(--mut)",lineHeight:1.8,marginBottom:16}}>
        {FIREBASE_ON
          ? <>Conectado como <b style={{color:"var(--text)"}}>{user?user.displayName||user.email:"—"}</b>. Os dados sincronizam no Firestore (coleção <code>mentoros</code>) e ficam espelhados neste dispositivo.</>
          : <>Modo local: o Firebase ainda não foi configurado, então os dados vivem só neste navegador. Cole a config no topo do arquivo para sincronizar entre PC e iPad.</>}
      </p>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <button className="btn" onClick={baixar}>Baixar backup (.json)</button>
        {FIREBASE_ON&&user&&<button className="btn dngr" onClick={()=>auth.signOut()}>Sair</button>}
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
const TABS=[
  ["dash","Dashboard","▦"],["cron","Cronograma","▤"],["eara","Ciclo EARA","⇄"],
  ["q","Questões","✓"],["lei","Lei Seca","§"],["pomo","Pomodoro","◔"],
  ["diag","Diagnóstico","◭"],["cfg","Ajustes","⚙"],
];
const TITLES={dash:"Dashboard",cron:"Cronograma · Fase v5",eara:"Ciclo EARA",q:"Questões",lei:"Lei Seca",pomo:"Pomodoro",diag:"Diagnóstico",cfg:"Ajustes"};

function App(){
  const [user,setUser]=useState(null);
  const [authReady,setAuthReady]=useState(!FIREBASE_ON);
  const [tab,setTab]=useState("dash");
  useEffect(()=>{
    if(!FIREBASE_ON) return;
    return auth.onAuthStateChanged(u=>{setUser(u);setAuthReady(true);});
  },[]);
  const [state,up,loaded]=useAppState(user);
  const pomo=usePomodoro(up);

  if(!authReady) return <div className="gate"><div className="gatebox"><h1>MentorOS</h1><p>Carregando…</p></div></div>;
  if(FIREBASE_ON&&!user) return (
    <div className="gate">
      <div className="gatebox">
        <h1>MentorOS<br/><span style={{fontSize:14,color:"var(--gold)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:3}}>FASE v5 · SEDES</span></h1>
        <p>13 semanas até 06/09. Método EARA, três certames, um plano. Entre para sincronizar seu progresso entre os dispositivos.</p>
        <button className="btn solid" onClick={()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert("Falha no login: "+e.message+"\nConfira os domínios autorizados no Firebase."))}>Entrar com Google</button>
      </div>
    </div>
  );

  const phase=phaseOf(currentWeek());
  return (
    <div className="app">
      <aside className="side">
        <div className="brand">MentorOS<small>FASE v5 · SEDES</small></div>
        <nav className="nav">
          {TABS.map(([id,nome,ic])=>(
            <button key={id} className={tab===id?"on":""} onClick={()=>setTab(id)}>
              <span className="ic">{ic}</span>{nome}
            </button>
          ))}
        </nav>
        <div className="sidefoot">
          <b>SEDES-DF</b> · Edital 1/2026 · Quadrix<br/>prova 06/09 · tronco → ARR · PRF<br/>Anki externo · sem flashcards aqui
        </div>
      </aside>
      <main className="main">
        {!FIREBASE_ON && <div className="notice">Modo local ativo — cole o <b>firebaseConfig</b> no topo do arquivo (Console Firebase → projeto mentoros-57228 → Configurações → SDK) para sincronizar PC ↔ iPad.</div>}
        <div className="topbar">
          <h1>{TITLES[tab]}</h1>
          <div className="chips">
            <span className="chip">Fase {phase.n} · {phase.nome}</span>
            <span className="chip gold">D-{daysToExam()} · SEDES</span>
          </div>
        </div>
        {!loaded ? <p style={{color:"var(--mut)"}}>Sincronizando…</p> : (
          tab==="dash"?<Dashboard state={state} up={up}/> :
          tab==="cron"?<Cronograma state={state} up={up}/> :
          tab==="eara"?<Kanban state={state} up={up}/> :
          tab==="q"?<Questoes state={state} up={up}/> :
          tab==="lei"?<LeiSeca state={state} up={up}/> :
          tab==="pomo"?<Pomodoro pomo={pomo}/> :
          tab==="diag"?<Diagnostico state={state}/> :
          <Ajustes state={state} user={user}/>
        )}
      </main>
      <nav className="bnav">
        {TABS.slice(0,6).map(([id,nome,ic])=>(
          <button key={id} className={tab===id?"on":""} onClick={()=>setTab(id)}>
            <span className="ic">{ic}</span>{nome.split(" ")[0]}
          </button>
        ))}
        <button className={tab==="diag"||tab==="cfg"?"on":""} onClick={()=>setTab(tab==="diag"?"cfg":"diag")}>
          <span className="ic">◭</span>Mais
        </button>
      </nav>
      <PomodoroBar p={pomo}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
