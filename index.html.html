// CADERNO DE ERROS — Novo modulo
// ═══════════════════════════════════════════════════════════════════════
function ErrorLog({d,sv}){
  const activeSubjs=CUR.filter(c=>!c.dormant);
  const[form,setForm]=useState({subjIdx:0,topic:"",question:"",error:""});
  const errors=fixArr(d.errorLog);
  const add=()=>{
    if(!form.question.trim())return;
    const subj=activeSubjs[form.subjIdx];
    const e={id:Date.now().toString(),date:lT(),subject:subj.s,clr:subj.c,topic:form.topic,question:form.question,error:form.error};
    sv({...d,errorLog:[e,...errors],xp:(d.xp||0)+3});
    setForm({...form,topic:"",question:"",error:""});
  };
  const remove=id=>sv({...d,errorLog:errors.filter(e=>e.id!==id)});
  // Group by subject for stats
  const bySubject={};errors.forEach(e=>{if(!bySubject[e.subject])bySubject[e.subject]=0;bySubject[e.subject]++});
  return<div>
    <h2 style={{fontSize:24,fontWeight:800,marginBottom:4}}>Caderno de Erros</h2>
    <p style={{color:"#888",fontSize:13,marginBottom:20}}>Cada erro em questao CEBRASPE vira anotacao. Releitura semanal obrigatoria aos domingos.</p>
    <div className="cd">
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Catalogar novo erro</h3>
      <div className="g2" style={{marginBottom:10}}>
        <div><span className="lb">Materia</span>
          <select className="sel" value={form.subjIdx} onChange={e=>setForm({...form,subjIdx:parseInt(e.target.value)})}>{activeSubjs.map((c,i)=><option key={i} value={i}>{c.s}</option>)}</select>
        </div>
        <div><span className="lb">Topico</span>
          <input className="inp" value={form.topic} onChange={e=>setForm({...form,topic:e.target.value})} placeholder="Ex: Concordancia verbal"/>
        </div>
      </div>
      <div><span className="lb">Enunciado da questao</span>
        <textarea className="ta" value={form.question} onChange={e=>setForm({...form,question:e.target.value})} rows={3} placeholder="Transcreva ou resuma a questao..."/>
      </div>
      <div style={{marginTop:10}}><span className="lb">Onde errei / pegadinha CEBRASPE</span>
        <textarea className="ta" value={form.error} onChange={e=>setForm({...form,error:e.target.value})} rows={3} placeholder="Qual foi a armadilha? Qual era o gabarito correto?"/>
      </div>
      <div style={{marginTop:12}}>
        <button className="btn bp" onClick={add} disabled={!form.question}>Catalogar</button>
      </div>
    </div>
    {Object.keys(bySubject).length>0&&<div className="cd"><h3 style={{fontSize:14,fontWeight:700,marginBottom:10}}>Erros por materia</h3>
      {Object.entries(bySubject).sort((a,b)=>b[1]-a[1]).map(([sub,n])=>{const c=CUR.find(x=>x.s===sub);return<div key={sub} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0"}}>
        <div className="sd" style={{background:c?c.c:"#888"}}/>
        <span style={{flex:1,fontSize:13}}>{sub}</span>
        <span style={{fontSize:12,fontWeight:700,color:"#dc2626"}}>{n} {n===1?"erro":"erros"}</span>
      </div>})}
    </div>}
    <div className="cd">
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Erros catalogados ({errors.length})</h3>
      {errors.length===0?<div style={{color:"#bbb",fontStyle:"italic",fontSize:13}}>Nenhum erro ainda. Quando errar em questao CEBRASPE, registre aqui.</div>:
        errors.map(e=><div key={e.id} className="err-item" style={{borderLeftColor:e.clr||"#dc2626"}}>
          <div className="err-head">
            <span className="bdg" style={{background:(e.clr||"#dc2626")+"18",color:e.clr||"#dc2626",fontWeight:700}}>{e.subject}</span>
            {e.topic&&<span style={{fontSize:12,color:"#666"}}>{e.topic}</span>}
            <span style={{fontSize:11,color:"#888",marginLeft:"auto",fontFamily:"'JetBrains Mono',monospace"}}>{e.date}</span>
            <button onClick={()=>remove(e.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc"}}><Ic name="trash" size={14}/></button>
          </div>
          <div className="err-q">{e.question}</div>
          {e.error&&<div className="err-exp">{e.error}</div>}
        </div>)}
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════════════════════════
// DIAGNOSTICO (preservado, com filtro de modo)
// ═══════════════════════════════════════════════════════════════════════
function Diag({d,sv}){
  const[sc,setSc]=useState(d.diagnosis?.scores||{});
  const activeSubjs=CUR.filter(c=>!c.dormant).map(c=>c.s);
  const up=(s,v)=>{const n={...sc,[s]:parseInt(v)||0};setSc(n);sv({...d,diagnosis:{scores:n}})};
  const filled=activeSubjs.filter(s=>sc[s]).length;
  const avg=filled>0?Math.round(activeSubjs.reduce((a,s)=>a+(sc[s]||0),0)/activeSubjs.length):0;
  return<div><h2 style={{fontSize:24,fontWeight:800,marginBottom:20}}>Diagnostico</h2>
    <div className="cd" style={{display:"flex",alignItems:"center",gap:16,marginBottom:18}}><div className="tc"><div style={{fontSize:42,fontWeight:800,color:avg>=70?"#059669":avg>=50?"#d97706":"#dc2626"}}>{avg}</div><div style={{fontSize:12,color:"#888",fontWeight:600}}>MEDIA</div></div><div style={{flex:1}}><div className="pb" style={{height:10}}><div className="pbf" style={{width:avg+"%",background:avg>=70?"#059669":avg>=50?"#d97706":"#dc2626",height:"100%"}}/></div></div></div>
    <div className="g2">{activeSubjs.map(s=>{const v=sc[s]||0;return<div className="cd" key={s} style={{padding:14}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:13,fontWeight:600}}>{s}</span><input className="inp" type="number" value={v} onChange={e=>up(s,e.target.value)} style={{width:55,textAlign:"center",padding:"4px 6px"}}/></div><div className="pb"><div className="pbf" style={{width:v+"%",background:v>=70?"#059669":v>=50?"#d97706":"#dc2626"}}/></div></div>})}</div>
  </div>;
}

ReactDOM.render(<Root/>,document.getElementById("root"));
</script>
</body>
</html>
