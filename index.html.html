<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f7f4;--cd:#fff;--bd:#e5e3de;--tx:#1a1a2e;--mt:#888;--lt:#fafaf8;--arr:#7c3aed;--prf:#059669}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx)}
.app{display:flex;min-height:100vh}
/* Sidebar */
.sb{background:var(--cd);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;transition:width .25s;overflow:hidden;flex-shrink:0;z-index:10}
.sb.c{width:52px;min-width:52px}.sb.e{width:220px;min-width:220px}
.sh{padding:14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8;min-height:52px}
.sh h1{font-size:18px;font-weight:800;letter-spacing:-.5px;white-space:nowrap;flex:1}
.st0{background:none;border:none;cursor:pointer;color:var(--mt);padding:4px;display:flex}
.sn{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nb{display:flex;align-items:center;gap:9px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;white-space:nowrap;overflow:hidden;min-height:36px;transition:all .15s;color:#666;background:transparent;position:relative}
.sb.c .nb{justify-content:center;padding:8px 0}.sb.e .nb{padding:8px 11px}
.nb.on{background:var(--tx);color:#fff;font-weight:600}.nb:hover:not(.on){background:#f0eeea}
.nb-badge{background:#dc2626;color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px;margin-left:auto}
.sb.c .nb-badge{position:absolute;top:2px;right:2px;margin-left:0}
.sf{padding:10px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:6}
/* Main */
.mn{flex:1;padding:24px 28px;overflow-y:auto;min-width:0;max-width:1100px}
/* Topbar mode toggle */
.mode-bar{display:flex;align-items:center;justify-content:space-between;background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:8px 14px;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.mode-bar-left{display:flex;align-items:center;gap:10px}
.mode-lbl{font-size:10px;letter-spacing:1.5px;color:var(--mt);font-weight:700;text-transform:uppercase}
.mode-toggle-grp{display:inline-flex;background:#f0eeea;border-radius:8px;padding:3px}
.mode-toggle-btn{padding:6px 14px;border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:700;color:#888;border-radius:6px;cursor:pointer;transition:all .15s}
.mode-toggle-btn.on-arr{background:var(--arr);color:#fff}
.mode-toggle-btn.on-prf{background:var(--prf);color:#fff}
.mode-flash-alert{display:inline-flex;align-items:center;gap:6px;background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
.mode-flash-alert .pulse-dot{width:8px;height:8px;border-radius:50%;background:#dc2626;animation:pulse-anim 1.5s ease-in-out infinite}
@keyframes pulse-anim{0%,100%{opacity:1}50%{opacity:.4}}
/* Cards */
.cd{background:var(--cd);border-radius:11px;border:1px solid var(--bd);padding:18px;margin-bottom:14px}
.cdf{background:var(--lt);border-radius:11px;border:1px solid var(--bd);padding:18px;margin-bottom:14px}
/* Buttons */
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all .15s}
.bp{background:var(--tx);color:#fff}.bs2{background:#f0eeea;color:var(--tx);border:1px solid #ddd}
.bdn{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.btn:disabled{opacity:.5;cursor:not-allowed}.bsm{padding:5px 10px;font-size:11px}
/* Inputs */
.inp,.sel,.ta{padding:8px 11px;border-radius:8px;border:1px solid #ddd;font-size:12px;font-family:inherit;outline:none;background:var(--lt);width:100%;box-sizing:border-box}
.sel{cursor:pointer}.ta{font-family:'JetBrains Mono',monospace;line-height:1.6;resize:vertical}
.lb{font-size:11px;font-weight:600;color:var(--mt);display:block;margin-bottom:3px}
.bdg{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600}
.pb{height:5px;border-radius:5px;background:#e8e6e1;overflow:hidden}.pbf{height:100%;border-radius:5px;transition:width .4s}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px}
.tc{text-align:center}
/* Phase tags */
.pt{display:inline-flex;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700}
.pT{background:#dc262618;color:#dc2626}.pQ{background:#f4a26118;color:#b45309}
.pR{background:#9d4edd18;color:#7c3aed}.pD2{background:#fcbf4918;color:#a16207}
.pSIM{background:#b4530918;color:#b45309}.pLS{background:#0f766e18;color:#0f766e}
.pE{background:#2563eb18;color:#2563eb}.pA{background:#05966918;color:#059669}.pA2{background:#7c3aed18;color:#7c3aed}
/* Weekly calendar */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:16px}
.week-day{min-height:120px;background:var(--cd);border-radius:10px;border:1px solid var(--bd);padding:8px;display:flex;flex-direction:column}
.week-day.today{border:2px solid #2563eb}
.week-day.sunday{background:#fffbeb;border-color:#d97706}
.week-day.saturday{background:#faf5ff;border-color:#7c3aed}
.wd-header{font-size:11px;font-weight:700;text-transform:uppercase;color:#999;margin-bottom:4px;text-align:center}
.wd-num{font-size:20px;font-weight:800;text-align:center;margin-bottom:8px}
.meta-card{padding:8px 10px 8px 12px;border-radius:8px;margin-bottom:6px;cursor:pointer;border-left:5px solid;transition:all .15s;font-size:11px;position:relative}
.meta-card:hover{opacity:.85;transform:translateY(-1px)}
.meta-card .mc-phase{font-size:9px;font-weight:700;opacity:.8}
.meta-card .mc-topic{font-weight:600;margin-top:2px;line-height:1.3}
.meta-card .mc-time{font-size:10px;opacity:.7;margin-top:3px}
.meta-card.done{opacity:.5;text-decoration:line-through}
/* Meta detail screen */
.meta-detail{max-width:700px}
.md-header{padding:24px;border-radius:14px;color:#fff;margin-bottom:20px}
.md-info{display:flex;gap:12px;margin-bottom:20px}
.md-info-box{flex:1;background:var(--cd);border-radius:10px;border:1px solid var(--bd);padding:14px}
.md-timer{background:var(--lt);border-radius:14px;border:1px solid var(--bd);padding:24px;text-align:center;margin-bottom:20px}
.md-orient{background:var(--cd);border-radius:14px;border:1px solid var(--bd);padding:20px;margin-bottom:20px}
.md-orient h3{font-size:15px;font-weight:700;margin-bottom:10px}
.md-orient p{font-size:14px;line-height:1.8;color:#444;white-space:pre-line}
/* Question inputs */
.qi{display:flex;align-items:center;gap:12px;padding:16px;background:#fafaf8;border-radius:10px}
.qi-box{flex:1;text-align:center}
.qi-inp{width:80px;padding:12px;border-radius:10px;border:2px solid #ddd;font-size:24px;font-weight:800;text-align:center;font-family:inherit;outline:none;background:#fff}
.qi-inp:focus{border-color:#2563eb}.qi-inp.green{border-color:#059669;color:#059669}.qi-inp.red{border-color:#dc2626;color:#dc2626}
/* Floating Pomodoro */
.pom-float{position:fixed;bottom:20px;right:20px;background:#fff;border-radius:16px;border:1px solid #e5e3de;box-shadow:0 8px 32px rgba(0,0,0,.12);padding:18px;width:220px;z-index:50}
/* Discursiva */
.disc-item{background:var(--lt);border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer}
.disc-summary{display:flex;justify-content:space-between;align-items:baseline;font-size:14px}
.disc-body{margin-top:12px;padding:14px;background:#fff;border:1px solid var(--bd);border-radius:8px;white-space:pre-wrap;line-height:1.7;font-size:13px}
.disc-corr{margin-top:8px;padding:12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;font-size:12px;color:#dc2626}
/* Caderno de Erros */
.err-item{background:var(--lt);border-left:4px solid;border-radius:8px;padding:12px;margin-bottom:10px}
.err-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.err-q{font-size:13px;margin-bottom:6px;line-height:1.5}
.err-exp{font-size:12px;color:#b45309;line-height:1.5;background:#fef3c7;padding:8px 10px;border-radius:6px}
/* Login */
.login-box{max-width:380px;width:90%;background:#fff;border-radius:16px;padding:40px;border:1px solid var(--bd)}
.saving{position:fixed;bottom:16px;right:16px;background:#1a1a2e;color:#fff;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;z-index:999;opacity:.8}
.sr{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0}
.sd{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.tr{transition:stroke-dashoffset 1s linear}
.new-badge{background:#2563eb18;color:#2563eb;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;font-family:'DM Sans',sans-serif}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:360px;width:90%}
.week-nav{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.week-nav button{background:none;border:1px solid var(--bd);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:inherit;font-weight:600;font-size:12px}
.week-nav button:hover{background:#f0eeea}
@media(max-width:700px){.week-grid{grid-template-columns:repeat(2,1fr)}.mn{padding:16px 14px}.sb.e{width:180px;min-width:180px}.qi-inp{width:65px;font-size:20px;padding:10px}}

// CRONOGRAMA TQR-D — Gerador respeitando modo ARR/PRF
// ═══════════════════════════════════════════════════════════════════════
// Tabela semanal por modo (ARR = padrao, PRF inverte os pesos)
// Estrutura: dia -> blocos [{time, subject_index_or_special, topic_hint, phase}]
function getWeeklyTemplate(mode){
  // mode: "ARR" | "PRF"
  // Cada dia: 3 blocos. Phase T = Teoria+Q embedded, R = Revisao, D2 = Discursiva, SIM = Simulado, LS = Lei Seca
  if(mode==="ARR"){
    return [
      // Segunda - Port (peso alto) + DCon
      {day:0,blocks:[{time:90,subj:"Lingua Portuguesa",phase:"T"},{time:90,subj:"Dir. Constitucional",phase:"T"},{time:30,subj:"FLASH",phase:"R"}]},
      // Terca - RICD + DAdm
      {day:1,blocks:[{time:90,subj:"Regimento Interno Camara",phase:"T"},{time:90,subj:"Dir. Administrativo",phase:"T"},{time:30,subj:"FLASH",phase:"R"}]},
      // Quarta - Port + Processo Legislativo
      {day:2,blocks:[{time:90,subj:"Lingua Portuguesa",phase:"T"},{time:90,subj:"Processo Legislativo",phase:"T"},{time:30,subj:"FLASH",phase:"R"}]},
      // Quinta - Redacao Oficial / Tecnica + RLM/Info alternados
      {day:3,blocks:[{time:90,subj:"Redacao Oficial",phase:"T",alt:"Tecnica Legislativa"},{time:90,subj:"Raciocinio Logico",phase:"T",alt:"Nocoes de TI"},{time:30,subj:"FLASH",phase:"R"}]},
      // Sexta - RICD + DCon/DAdm alternados
      {day:4,blocks:[{time:90,subj:"Regimento Interno Camara",phase:"T"},{time:90,subj:"Dir. Constitucional",phase:"T",alt:"Dir. Administrativo"},{time:30,subj:"FLASH",phase:"R"}]},
      // Sabado - DISCURSIVA + ramo PRF (manter aquecido)
      {day:5,blocks:[{time:90,subj:"Redacao Oficial",phase:"D2"},{time:90,subj:"Legislacao de Transito (CTB)",phase:"T"},{time:30,subj:"FLASH",phase:"R"}]},
      // Domingo - Simulado + DHum/Etica alternados
      {day:6,blocks:[{time:90,subj:"SIMULADO",phase:"SIM"},{time:90,subj:"Direitos Humanos",phase:"T",alt:"Etica no Serv. Publico"},{time:30,subj:"FLASH",phase:"R"}]},
    ];
  } else { // PRF mode - inverte pesos
    return [
      {day:0,blocks:[{time:90,subj:"Lingua Portuguesa",phase:"T"},{time:90,subj:"Legislacao de Transito (CTB)",phase:"T"},{time:30,subj:"FLASH",phase:"R"}]},
      {day:1,blocks:[{time:90,subj:"Direitos Humanos",phase:"T"},{time:90,subj:"Dir. Administrativo",phase:"T"},{time:30,subj:"FLASH",phase:"R"}]},
      {day:2,blocks:[{time:90,subj:"Lingua Portuguesa",phase:"T"},{time:90,subj:"Legislacao de Transito (CTB)",phase:"T"},{time:30,subj:"FLASH",phase:"R"}]},

      {day:4,blocks:[{time:90,subj:"Etica no Serv. Publico",phase:"T"},{time:90,subj:"Legislacao de Transito (CTB)",phase:"T"},{time:30,subj:"FLASH",phase:"R"}]},
      {day:5,blocks:[{time:90,subj:"Redacao Oficial",phase:"D2"},{time:90,subj:"Regimento Interno Camara",phase:"T"},{time:30,subj:"FLASH",phase:"R"}]},
      {day:6,blocks:[{time:90,subj:"SIMULADO",phase:"SIM"},{time:90,subj:"Geopolitica e Atualidades PRF",phase:"T"},{time:30,subj:"FLASH",phase:"R"}]},
    ];
  }
}

// Generate plan based on TQR-D template
function generateTQRDPlan(mode, weeks, startDate, existingDone, existingStudied){
  const tmpl=getWeeklyTemplate(mode);
  const items=[];let uid=Date.now();
  // Topic pointer per subject (skips already-completed)
  const tp={};CUR.forEach((c,ci)=>{tp[ci]=0;while(tp[ci]<c.t.length&&existingDone.has(tid(ci,tp[ci])))tp[ci]++});
  // Subject name -> index map
  const subjIdx={};CUR.forEach((c,i)=>{subjIdx[c.s]=i});
  // Track alternation state per subject pair (we use a counter per week)
  let altCounter=0;
  const studied=[];
  // Lei Seca queue - prioritize by mode
  const leisQueue=[];
  if(mode==="ARR"){
    LEIS_CONTENT.forEach(lei=>{if(lei.g==="tronco"||lei.g==="arr")lei.blocos.forEach(b=>leisQueue.push({leiId:lei.id,leiNome:lei.nome,leiClr:lei.clr,bloco:b}))});
  } else {
    LEIS_CONTENT.forEach(lei=>{if(lei.g==="tronco"||lei.g==="prf")lei.blocos.forEach(b=>leisQueue.push({leiId:lei.id,leiNome:lei.nome,leiClr:lei.clr,bloco:b}))});
  }
  let leiPtr=0;

  for(let dy=0;dy<weeks*7;dy++){
    const ds=aD(startDate,dy);const dow=dw(ds);// dow: 0=Sun..6=Sat
    // Map weekly template position: 0=Monday, 6=Sunday
    const tmplPos=(dow+6)%7;
    const dayTmpl=tmpl[tmplPos];

    dayTmpl.blocks.forEach(block=>{
      // Handle alternated subjects
      let subjName=block.subj;
      if(block.alt && (Math.floor(dy/7))%2===1) subjName=block.alt;

      if(block.phase==="R" && subjName==="FLASH"){
        items.push({id:"m_"+(uid++),subject:"FLASHCARDS",tn:"Revisao espacada SM-2",tkey:"flash_"+dy,phase:"R",date:ds,dur:block.time,done:false,clr:"#9d4edd"});
        return;
      }
      if(block.phase==="SIM"){
        items.push({id:"m_"+(uid++),subject:"SIMULADO",tn:mode==="ARR"?"Simulado CEBRASPE - 40 questoes (ARR)":"Simulado CEBRASPE - 40 questoes (PRF)",tkey:"sim_"+dy,phase:"SIM",date:ds,dur:block.time,done:false,clr:"#b45309"});
        return;
      }
      if(block.phase==="D2"){
        items.push({id:"m_"+(uid++),subject:"DISCURSIVA",tn:"Redacao "+(mode==="ARR"?"Oficial (Padrao Oficio)":"dissertativa CEBRASPE"),tkey:"disc_"+dy,phase:"D2",date:ds,dur:block.time,done:false,clr:"#fcbf49"});
        return;
      }
      const ci=subjIdx[subjName];
      if(ci===undefined){return}// safety
      const c=CUR[ci];
      // Pick next available topic from this subject (skip dones)
      while(tp[ci]<c.t.length && existingDone.has(tid(ci,tp[ci]))) tp[ci]++;
      if(tp[ci]>=c.t.length){
        // No more topics — schedule revision of this subject's done topics
        const doneTopics=c.t.map((_,ti)=>ti).filter(ti=>existingDone.has(tid(ci,ti)));
        if(doneTopics.length>0){
          const ti=doneTopics[Math.floor(Math.random()*doneTopics.length)];
          items.push({id:"m_"+(uid++),subject:c.s,tn:"Revisao aprofundada: "+tN(ci,ti),tkey:"revdeep_"+dy+"_"+ci+"_"+ti,phase:"R",date:ds,dur:block.time,done:false,clr:c.c,ci,ti});
        }
        return;
      }
      const ti=tp[ci];
      const tkey=tid(ci,ti);
      // T phase = teoria + questoes integradas no mesmo bloco
      items.push({id:"m_"+(uid++),subject:c.s,tn:tN(ci,ti),tkey,phase:"T",date:ds,dur:block.time,done:false,clr:c.c,ci,ti});
      studied.push({dy,ci,ti,tkey});
      tp[ci]++;
    });

    // Inject Lei Seca on Mon/Wed/Fri as a 4th item (small block, opt-in)
    if((dow===1||dow===3||dow===5) && leiPtr<leisQueue.length){
      const li=leisQueue[leiPtr];
      items.push({id:"m_"+(uid++),subject:"LEI SECA",tn:li.leiNome+" - "+li.bloco.titulo,tkey:"ls_"+li.bloco.id,leiBlocoId:li.bloco.id,phase:"LS",date:ds,dur:20,done:false,clr:li.leiClr});
      leiPtr++;
    }
  }
  return items;
}

    plus:<g><line x1="12" y1="5" x2="12" y2="19" {...p}/><line x1="5" y1="12" x2="19" y2="12" {...p}/></g>,
    trash:<g><polyline points="3 6 5 6 21 6" {...p}/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" {...p}/></g>,
    play:<polygon points="5 3 19 12 5 21 5 3" {...p}/>,
    pause:<g><rect x="6" y="4" width="4" height="16" {...p}/><rect x="14" y="4" width="4" height="16" {...p}/></g>,
    reset:<g><path d="M1 4v6h6" {...p}/><path d="M3.51 15a9 9 0 102.13-9.36L1 10" {...p}/></g>,
    target:<g><circle cx="12" cy="12" r="10" {...p}/><circle cx="12" cy="12" r="6" {...p}/><circle cx="12" cy="12" r="2" {...p}/></g>,
    award:<g><circle cx="12" cy="8" r="7" {...p}/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88" {...p}/></g>,
    chevL:<polyline points="15 18 9 12 15 6" {...p}/>,
    chevR:<polyline points="9 18 15 12 9 6" {...p}/>,
    chevD:<polyline points="6 9 12 15 18 9" {...p}/>,
    upload:<g><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" {...p}/><polyline points="17 8 12 3 7 8" {...p}/><line x1="12" y1="3" x2="12" y2="15" {...p}/></g>,
    back:<g><line x1="19" y1="12" x2="5" y2="12" {...p}/><polyline points="12 19 5 12 12 5" {...p}/></g>,
    logout:<g><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" {...p}/><polyline points="16 17 21 12 16 7" {...p}/><line x1="21" y1="12" x2="9" y2="12" {...p}/></g>,
    pen:<g><path d="M12 20h9" {...p}/><path d="M16.5 3.5a2.12 2.12 0 113 3L7 19l-4 1 1-4L16.5 3.5z" {...p}/></g>,
    x:<g><line x1="18" y1="6" x2="6" y2="18" {...p}/><line x1="6" y1="6" x2="18" y2="18" {...p}/></g>,
  };
  return<svg width={size} height={size} viewBox="0 0 24 24">{m[name]||null}</svg>;
}

// ROOT + AUTH
// ═══════════════════════════════════════════════════════════════════════
function Root(){
  const[user,setUser]=useState(undefined);const[data,setData]=useState(null);const[saving,setSaving]=useState(false);const stRef=useRef(null);
  useEffect(()=>{auth.onAuthStateChanged(u=>{setUser(u||null);if(u){FB.init(u.uid);FB.g().then(raw=>{const d=fixData(raw);setData(d||{studyPlan:[],questions:[],questionStats:{},flashcards:[],diagnosis:{scores:{}},simulados:[],pomodoro:{sessions:0,totalMinutes:0},xp:0,td:{},leiReading:{},redacoes:[],errorLog:[],priorityMode:"ARR"})})}})},[]);
  const sv=useCallback(d=>{setData(d);setSaving(true);clearTimeout(stRef.current);stRef.current=setTimeout(()=>{FB.s(d);setSaving(false)},800)},[]);
  if(user===undefined)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><h1 style={{fontSize:36,fontWeight:800}}>MentorOS</h1></div>;
  if(!user)return<Login/>;
  if(!data)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><div className="tc"><h1 style={{fontSize:36,fontWeight:800}}>MentorOS</h1><p style={{color:"#888",marginTop:8}}>Carregando...</p></div></div>;
  return<><App d={data} sv={sv}/>{saving&&<div className="saving">Salvando...</div>}</>;
}
function Login(){
  const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[err,setErr]=useState("");const[ld,setLd]=useState(false);
  const go=async()=>{if(!email||!pw)return;setLd(true);setErr("");try{await auth.signInWithEmailAndPassword(email,pw)}catch{setErr("Email ou senha incorretos")}setLd(false)};
  return<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:20}}>
    <div className="login-box tc"><h1 style={{fontSize:28,fontWeight:800,marginBottom:4}}>MentorOS</h1><p style={{color:"#888",fontSize:13,marginBottom:28}}>Estrategia TQR-D · ARR Camara + PRF</p>
      <div style={{textAlign:"left",display:"flex",flexDirection:"column",gap:12}}>
        <div><span className="lb">Email</span><input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com"/></div>
        <div><span className="lb">Senha</span><input className="inp" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="********" onKeyDown={e=>e.key==="Enter"&&go()}/></div>
        {err&&<div style={{color:"#dc2626",fontSize:12,fontWeight:600}}>{err}</div>}
        <button className="btn bp" onClick={go} disabled={ld} style={{width:"100%",padding:"12px",fontSize:14}}>{ld?"Entrando...":"Entrar"}</button>
      </div>
    </div>
  </div>;
}

// MAIN APP
// ═══════════════════════════════════════════════════════════════════════
function App({d,sv}){
  const[tab,setTab]=useState("dashboard");const[so,setSo]=useState(window.innerWidth>700);
  const[pomVis,setPomVis]=useState(false);
  const[openMeta,setOpenMeta]=useState(null);
  const PM=[{l:"Foco",d:1800,c:"#dc2626"},{l:"Pausa",d:300,c:"#059669"},{l:"Longa",d:900,c:"#2563eb"}];
  const[pMd,setPMd]=useState(0);const[pTl,setPTl]=useState(PM[0].d);const[pRn,setPRn]=useState(false);const pIv=useRef(null);const pDr=useRef(d);pDr.current=d;
  useEffect(()=>{if(pRn){pIv.current=setInterval(()=>{setPTl(p=>{if(p<=1){clearInterval(pIv.current);setPRn(false);if(pMd===0){const x=pDr.current;sv({...x,pomodoro:{sessions:(x.pomodoro?.sessions||0)+1,totalMinutes:(x.pomodoro?.totalMinutes||0)+30},xp:(x.xp||0)+20})}return 0}return p-1})},1000)}return()=>clearInterval(pIv.current)},[pRn,pMd]);
  const pSw=m=>{clearInterval(pIv.current);setPMd(m);setPTl(PM[m].d);setPRn(false)};
  const pMn=Math.floor(pTl/60);const pSc=pTl%60;const pPc=((PM[pMd].d-pTl)/PM[pMd].d)*100;
  // Due cards count for badge
  const fc=fixArr(d.flashcards);
  const dueCount=fc.filter(f=>f&&isDueCard(f)).length;
  const newCount=fc.filter(f=>f&&isNewCard(f)).length;
  const flashTotal=dueCount+Math.min(newCount,NEW_PER_DAY);
  const tabs=[
    {id:"dashboard",icon:"dashboard",label:"Dashboard"},
    {id:"plano",icon:"book",label:"Cronograma"},
    {id:"leiseca",icon:"target",label:"Lei Seca"},
    {id:"questoes",icon:"check",label:"Questoes"},
    {id:"flash",icon:"flash",label:"Flashcards",badge:flashTotal},
    {id:"discursiva",icon:"pen",label:"Discursiva"},
    {id:"erros",icon:"x",label:"Caderno Erros"},
    {id:"diag",icon:"diag",label:"Diagnostico"},
  ];
  const togglePriority=()=>{
    const newMode=d.priorityMode==="ARR"?"PRF":"ARR";
    if(!confirm("Trocar foco para "+newMode+"? Isso afeta o gerador de cronograma daqui pra frente. O plano atual NAO sera apagado."))return;
    sv({...d,priorityMode:newMode});
  };
  const pg={
    dashboard:<Dash d={d} sv={sv} go={setTab} flashTotal={flashTotal} dueCount={dueCount} newCount={newCount}/>,
    plano:<Plano d={d} sv={sv} onOpenMeta={setOpenMeta}/>,
    leiseca:<LeiSeca d={d} sv={sv}/>,
    questoes:<Quest d={d} sv={sv}/>,
    flash:<Flash d={d} sv={sv}/>,
    discursiva:<Discursiva d={d} sv={sv}/>,
    erros:<ErrorLog d={d} sv={sv}/>,
    diag:<Diag d={d} sv={sv}/>,
  };
  const mainContent=openMeta?<MetaDetail meta={openMeta} d={d} sv={sv} onBack={()=>setOpenMeta(null)} pRn={pRn} setPRn={setPRn} pTl={pTl} setPTl={setPTl} pMd={pMd} setPMd={setPMd} pSw={pSw} PM={PM} pMn={pMn} pSc={pSc} pPc={pPc}/>:<>
    <div className="mode-bar">
      <div className="mode-bar-left">
        <span className="mode-lbl">Foco</span>
        <div className="mode-toggle-grp">
          <button className={"mode-toggle-btn"+(d.priorityMode==="ARR"?" on-arr":"")} onClick={()=>d.priorityMode!=="ARR"&&togglePriority()}>ARR · Camara</button>
          <button className={"mode-toggle-btn"+(d.priorityMode==="PRF"?" on-prf":"")} onClick={()=>d.priorityMode!=="PRF"&&togglePriority()}>PRF · Adm.</button>
        </div>
      </div>
      {flashTotal>0&&tab!=="flash"&&<div className="mode-flash-alert" onClick={()=>setTab("flash")}>
        <span className="pulse-dot"/>
        {flashTotal} flashcards aguardando
      </div>}
    </div>
    {pg[tab]}
  </>;
  return<div className="app">
    <nav className={`sb ${so?"e":"c"}`}>
      <div className="sh" style={{justifyContent:so?"flex-start":"center"}}>{so&&<h1>MentorOS</h1>}<button className="st0" onClick={()=>setSo(!so)}><Ic name={so?"chevL":"chevR"} size={18}/></button></div>
      <div className="sn">
        {tabs.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setOpenMeta(null)}} title={t.label} className={`nb ${tab===t.id&&!openMeta?"on":""}`}><span style={{flexShrink:0,display:"flex"}}><Ic name={t.icon} size={16}/></span>{so&&<span style={{flex:1}}>{t.label}</span>}{t.badge>0&&<span className="nb-badge">{t.badge}</span>}</button>)}
        <button onClick={()=>setPomVis(!pomVis)} title="Pomodoro" className={`nb ${pomVis?"on":""}`}><span style={{flexShrink:0,display:"flex"}}><Ic name="timer" size={16}/></span>{so&&<span>Pomodoro {pRn?String(pMn).padStart(2,"0")+":"+String(pSc).padStart(2,"0"):""}</span>}</button>
      </div>
      <div className="sf" style={{justifyContent:so?"flex-start":"center",flexDirection:so?"row":"column",gap:so?6:4}}><span style={{display:"flex"}}><Ic name="award" size={14} color="#d97706"/></span>{so&&<span style={{fontSize:11,fontWeight:700,color:"#d97706",flex:1}}>{d.xp||0} XP</span>}<button className="st0" onClick={()=>auth.signOut()} title="Sair"><Ic name="logout" size={14} color="#dc2626"/></button></div>
    </nav>
    <main className="mn">{mainContent}</main>
    {pomVis&&!openMeta&&<div className="pom-float">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:13,fontWeight:700}}>Pomodoro</span>
        <button onClick={()=>setPomVis(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#999",fontSize:18}}>x</button>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:12}}>{PM.map((m,i)=><button key={i} onClick={()=>pSw(i)} style={{flex:1,padding:"5px",borderRadius:6,border:"2px solid "+(pMd===i?m.c:"#e5e3de"),background:pMd===i?m.c+"15":"#fff",color:pMd===i?m.c:"#999",fontWeight:700,fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>{m.l}</button>)}</div>
      <div className="tc" style={{position:"relative",marginBottom:10}}>
        <svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="#e8e6e1" strokeWidth="6"/><circle cx="60" cy="60" r="52" fill="none" stroke={PM[pMd].c} strokeWidth="6" strokeDasharray={2*Math.PI*52} strokeDashoffset={2*Math.PI*52*(1-pPc/100)} strokeLinecap="round" transform="rotate(-90 60 60)" className="tr"/></svg>
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)"}}><div style={{fontSize:28,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:PM[pMd].c}}>{String(pMn).padStart(2,"0")}:{String(pSc).padStart(2,"0")}</div></div>
      </div>
      <div style={{display:"flex",gap:6,justifyContent:"center"}}>
        <button className="btn" style={{background:PM[pMd].c,color:"#fff",padding:"6px 16px",fontSize:12}} onClick={()=>setPRn(!pRn)}>{pRn?"Pausar":"Iniciar"}</button>
        <button className="btn bs2" style={{padding:"6px 10px"}} onClick={()=>{clearInterval(pIv.current);setPTl(PM[pMd].d);setPRn(false)}}><Ic name="reset" size={14}/></button>
      </div>
    </div>}
  </div>;
}

// ═══════════════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════
function Dash({d,sv,go,flashTotal,dueCount,newCount}){
  const q=fixArr(d.questions);const tQ=q.length;const cor=q.filter(x=>x.correct).length;const pct=tQ>0?Math.round(cor/tQ*100):0;
  const td=d.td||{};const dn=Object.keys(td).filter(k=>td[k]).length;
  const today=lT();const sp=fixArr(d.studyPlan);const tp=sp.filter(s=>s.date===today);
  const lr=d.leiReading||{};const totalBlocos=LEIS_CONTENT.reduce((a,l)=>a+l.blocos.length,0);
  const doneBlocos=Object.keys(lr).filter(k=>lr[k]).length;
  const leiPct=totalBlocos>0?Math.round(doneBlocos/totalBlocos*100):0;
  const doneToday=tp.filter(s=>s.done).length;const totalToday=tp.length;
  const redacoes=fixArr(d.redacoes).length;
  const erros=fixArr(d.errorLog).length;

  return<div>
    <h2 style={{fontSize:24,fontWeight:800,marginBottom:4}}>Dashboard</h2>
    <p style={{color:"#888",fontSize:13,marginBottom:20}}>Metodo TQR-D · Teoria · Questoes · Revisao · Discursiva | Modo: <strong style={{color:d.priorityMode==="ARR"?"#7c3aed":"#059669"}}>{d.priorityMode}</strong></p>
    <div className="g4" style={{marginBottom:20}}>
      {[
        {l:"Questoes",v:tQ,c:"#2563eb"},
        {l:"Acerto",v:pct+"%",c:"#059669"},
        {l:"Topicos",v:dn+"/"+TTOT,c:"#7c3aed"},
        {l:"Lei Seca",v:leiPct+"%",c:"#0f766e"},
        {l:"Flash hoje",v:flashTotal,c:"#9d4edd"},
        {l:"Discursivas",v:redacoes,c:"#fcbf49"},
        {l:"Erros cat.",v:erros,c:"#dc2626"},
        {l:"Pomodoros",v:d.pomodoro?.sessions||0,c:"#d97706"},
      ].map((s,i)=>
        <div className="cd" key={i} style={{padding:12}}><div style={{fontSize:10,color:"#999",fontWeight:600,textTransform:"uppercase"}}>{s.l}</div><div style={{fontSize:22,fontWeight:800,color:s.c,marginTop:4}}>{s.v}</div></div>)}
    </div>
    {tp.length>0&&<div className="cd" style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h3 style={{fontSize:15,fontWeight:700}}>Metas de Hoje</h3>
        <span style={{fontSize:13,fontWeight:700,color:doneToday===totalToday?"#059669":"#888"}}>{doneToday}/{totalToday}</span>
      </div>
      {tp.map((s,i)=><div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<tp.length-1?"1px solid #f0eeea":"none"}}>
        <div style={{width:4,height:32,background:pC(s.phase),borderRadius:2,flexShrink:0}}/>
        <span className={`pt p${s.phase}`}>{pLabel(s.phase)}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,textDecoration:s.done?"line-through":"none",color:s.done?"#aaa":"#1a1a2e"}}>{s.tn}</div>
          <div style={{fontSize:11,color:"#999"}}>{s.subject}</div>
        </div>
        <span style={{fontSize:11,color:"#aaa"}}>{s.dur}min</span>
        <div style={{width:12,height:12,borderRadius:6,background:s.done?"#059669":"#ddd",flexShrink:0}}/>
      </div>)}
    </div>}
    <div className="cd">
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Progresso por Materia (foco {d.priorityMode})</h3>
      {CUR.filter(c=>{
        if(c.dormant)return false;
        if(d.priorityMode==="ARR")return c.g!=="prf"||c.s==="Legislacao de Transito (CTB)"||c.s==="Direitos Humanos";
        return c.g!=="arr"||c.s==="Regimento Interno Camara"||c.s==="Redacao Oficial";
      }).map((c,idx)=>{const ci=CUR.indexOf(c);const done=c.t.filter((_,ti)=>td[tid(ci,ti)]).length;const tot=c.t.length;const p=Math.round(done/tot*100);
        return<div key={ci} style={{marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><div className="sd" style={{background:c.c}}/><span style={{flex:1,fontSize:13,fontWeight:600}}>{c.s}</span><span style={{fontSize:11,color:"#888",fontWeight:600,padding:"1px 6px",background:c.g==="arr"?"#7c3aed18":c.g==="prf"?"#05966918":"#f0eeea",borderRadius:6,marginRight:6}}>{c.g.toUpperCase()}</span><span style={{fontSize:12,fontWeight:700,color:c.c}}>{done}/{tot}</span></div>
          <div className="pb"><div className="pbf" style={{width:p+"%",background:c.c}}/></div>
        </div>})}
    </div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:16}}>
      <button className="btn bs2 bsm" onClick={()=>go("plano")}>Cronograma</button>
      <button className="btn bs2 bsm" onClick={()=>go("leiseca")}>Lei Seca</button>
      <button className="btn bs2 bsm" onClick={()=>go("questoes")}>Questoes</button>
      <button className="btn bs2 bsm" onClick={()=>go("flash")}>Flashcards</button>
      <button className="btn bs2 bsm" onClick={()=>go("discursiva")}>Discursiva</button>
      <button className="btn bs2 bsm" onClick={()=>go("erros")}>Caderno Erros</button>
    </div>
  </div>;
}
// ═══════════════════════════════════════════════════════════════════════
// LEI SECA (preservado, com filtro de modo)
// ═══════════════════════════════════════════════════════════════════════
function LeiSeca({d,sv}){
  const lr=d.leiReading||{};
  const[expanded,setExpanded]=useState(null);
  const[showAll,setShowAll]=useState(false);
  const toggle=(bid)=>{const n={...lr,[bid]:!lr[bid]};sv({...d,leiReading:n,xp:(d.xp||0)+(n[bid]?5:-5)})};
  // Filter leis by mode (unless showAll)
  const filteredLeis=showAll?LEIS_CONTENT:LEIS_CONTENT.filter(l=>l.g==="tronco"||l.g===(d.priorityMode==="ARR"?"arr":"prf"));
  const totalBlocos=filteredLeis.reduce((a,l)=>a+l.blocos.length,0);
  const doneBlocos=filteredLeis.reduce((a,l)=>a+l.blocos.filter(b=>lr[b.id]).length,0);
  const globalPct=totalBlocos>0?Math.round(doneBlocos/totalBlocos*100):0;
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
      <div>
        <h2 style={{fontSize:24,fontWeight:800,marginBottom:4}}>Lei Seca</h2>
        <p style={{color:"#888",fontSize:13,marginBottom:20}}>Leitura sistematica · 20min/dia · {showAll?"todas as leis":"apenas leis do modo "+d.priorityMode}</p>
      </div>
      <button className="btn bs2 bsm" onClick={()=>setShowAll(!showAll)}>{showAll?"Filtrar por modo":"Ver todas as leis"}</button>
    </div>
    <div className="cd" style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
      <div className="tc"><div style={{fontSize:38,fontWeight:800,color:globalPct>=70?"#059669":globalPct>=30?"#d97706":"#dc2626"}}>{globalPct}%</div><div style={{fontSize:11,color:"#888",fontWeight:600}}>CONCLUIDO</div></div>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>{doneBlocos} de {totalBlocos} blocos</div>
        <div className="pb" style={{height:8}}><div className="pbf" style={{width:globalPct+"%",background:globalPct>=70?"#059669":globalPct>=30?"#d97706":"#dc2626"}}/></div>
      </div>
    </div>
    {filteredLeis.map(lei=>{
      const blocosFeitos=lei.blocos.filter(b=>lr[b.id]).length;
      const pctLei=Math.round(blocosFeitos/lei.blocos.length*100);
      const isExp=expanded===lei.id;
      return<div className="cd" key={lei.id} style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"16px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,background:lei.clr+"10",borderLeft:"5px solid "+lei.clr}} onClick={()=>setExpanded(isExp?null:lei.id)}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontSize:15,fontWeight:800,color:lei.clr}}>{lei.nome}</div>
              <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:6,background:lei.g==="arr"?"#7c3aed18":lei.g==="prf"?"#05966918":"#f0eeea",color:lei.g==="arr"?"#7c3aed":lei.g==="prf"?"#059669":"#888"}}>{lei.g.toUpperCase()}</span>
            </div>
            <div style={{fontSize:12,color:"#666",marginTop:2}}>{lei.full}</div>
          </div>
          <div className="tc">
            <div style={{fontSize:16,fontWeight:800,color:lei.clr}}>{pctLei}%</div>
            <div style={{fontSize:10,color:"#888"}}>{blocosFeitos}/{lei.blocos.length}</div>
          </div>
          <span style={{display:"flex",transition:"transform .2s",transform:isExp?"rotate(180deg)":"rotate(0)",color:"#888"}}><Ic name="chevD" size={18}/></span>
        </div>
        <div style={{padding:"0 18px"}}>
          <div className="pb" style={{height:4,borderRadius:0,margin:0}}><div className="pbf" style={{width:pctLei+"%",background:lei.clr}}/></div>
        </div>
        {isExp&&<div style={{padding:"14px 18px"}}>
          {lei.blocos.map((b,i)=>{const done=!!lr[b.id];return<div key={b.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 0",borderBottom:i<lei.blocos.length-1?"1px solid #f0eeea":"none"}}>
            <div style={{width:22,height:22,borderRadius:6,background:done?lei.clr:"transparent",border:done?"none":"2px solid #ccc",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginTop:2}} onClick={()=>toggle(b.id)}>{done&&<Ic name="check" size={14} color="#fff"/>}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:done?"#aaa":"#1a1a2e",textDecoration:done?"line-through":"none"}}>{b.titulo}</div>
              <div style={{fontSize:11,color:"#888",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{b.artigos}</div>
              <div style={{fontSize:12,color:"#555",marginTop:4,lineHeight:1.5}}>{b.foco}</div>
            </div>
          </div>})}
        </div>}
      </div>;
    })}
  </div>;
}

// CRONOGRAMA (Plano TQR-D)
// ═══════════════════════════════════════════════════════════════════════
function Plano({d,sv,onOpenMeta}){
  const[weekOff,setWeekOff]=useState(0);
  const[gW,sGW]=useState("4");
  const[showImport,setShowImport]=useState(false);
  const[importText,setImportText]=useState("");
  const[importMsg,setImportMsg]=useState("");
  const[showAdd,setShowAdd]=useState(false);
  const[addDate,setAddDate]=useState(lT());
  const[addSubj,setAddSubj]=useState("");
  const[addTopic,setAddTopic]=useState("");
  const[addPhase,setAddPhase]=useState("T");
  const[addDur,setAddDur]=useState("90");
  const[moveItem,setMoveItem]=useState(null);
  const[moveTo,setMoveTo]=useState("");
  const[showMarkDone,setShowMarkDone]=useState(false);
  const sp=fixArr(d.studyPlan);
  const today=lT();const weekStart=aD(getWeekStart(today),weekOff*7);
  const days=Array.from({length:7},(_,i)=>aD(weekStart,i));
  const doImport=()=>{
    if(!importText.trim()){setImportMsg("Cole o cronograma primeiro");return}
    const lines=importText.trim().split("\n").filter(l=>l.trim()&&!l.startsWith("#"));
    const items=[];let errs=0;
    lines.forEach((line,idx)=>{
      const sep=line.includes("|")?"|":line.includes("\t")?"\t":line.includes(";")?";":"|";
      const parts=line.split(sep).map(s=>s.trim());
      if(parts.length<4){errs++;return}
      const date=parts[0];const subject=parts[1];const topic=parts[2];
      const phase=(parts[3]||"T").toUpperCase();
      const dur=parseInt(parts[4])||90;
      let finalDate=date;
      if(date.match(/^\d{2}\/\d{2}\/\d{4}$/)){const[dd,mm,yy]=date.split("/");finalDate=yy+"-"+mm+"-"+dd;}
      else if(!date.match(/^\d{4}-\d{2}-\d{2}$/)){errs++;return}
      const curMatch=CUR.find(c=>c.s.toLowerCase()===subject.toLowerCase()||subject.toLowerCase().includes(c.s.toLowerCase().split(" ")[0]));
      const clr=curMatch?curMatch.c:phase==="R"?"#7c3aed":phase==="SIM"?"#b45309":phase==="LS"?"#0f766e":phase==="D2"?"#fcbf49":"#888";
      const resolvedSubj=curMatch?curMatch.s:subject;
      items.push({id:"m_"+Date.now()+"_"+Math.random().toString(36).substr(2,6),subject:resolvedSubj,tn:topic,tkey:"imp_"+idx,phase,date:finalDate,dur,done:false,clr});
    });
    if(items.length===0){setImportMsg("Nenhum item valido. Use: DATA | MATERIA | TOPICO | FASE | DURACAO");return}
    sv({...d,studyPlan:[...sp,...items]});
    setImportMsg(items.length+" metas importadas!"+(errs>0?" ("+errs+" linhas ignoradas)":""));
    setImportText("");
    setTimeout(()=>{setImportMsg("");setShowImport(false)},3000);
  };
  const doAdd=()=>{
    if(!addSubj.trim()||!addTopic.trim())return;
    const curMatch=CUR.find(c=>c.s===addSubj);
    const clr=curMatch?curMatch.c:addPhase==="R"?"#7c3aed":addPhase==="LS"?"#0f766e":addPhase==="D2"?"#fcbf49":"#888";
    const item={id:"m_"+Date.now()+"_"+Math.random().toString(36).substr(2,6),subject:addSubj,tn:addTopic,tkey:"add_"+Date.now(),phase:addPhase,date:addDate,dur:parseInt(addDur)||90,done:false,clr};
    sv({...d,studyPlan:[...sp,item]});
    setShowAdd(false);setAddTopic("");
  };
  const rm=id=>sv({...d,studyPlan:sp.filter(s=>s.id!==id)});
  const doMove=()=>{if(!moveTo||!moveItem)return;sv({...d,studyPlan:sp.map(s=>s.id===moveItem?{...s,date:moveTo}:s)});setMoveItem(null);setMoveTo("")};

  const genTQRD=()=>{
    const weeks=parseInt(gW)||4;
    const td=d.td||{};
    const completedTopics=new Set(Object.keys(td).filter(k=>td[k]));
    const existingStudied={};
    sp.forEach(s=>{if(s.done&&s.tkey)existingStudied[s.tkey]=true});
    const newItems=generateTQRDPlan(d.priorityMode,weeks,lT(),completedTopics,existingStudied);
    const donePreserved=sp.filter(s=>s.done);
    sv({...d,studyPlan:[...donePreserved,...newItems]});
  };

  const tog=id=>{
    const p=sp.map(s=>s.id===id?{...s,done:!s.done}:s);
    const f=p.find(s=>s.id===id);
    const td={...(d.td||{})};
    if(f&&f.done&&f.phase==="T"&&f.ci!==undefined&&f.ti!==undefined)td[f.tkey]=true;
    const lr={...(d.leiReading||{})};
    if(f&&f.leiBlocoId)lr[f.leiBlocoId]=f.done;
    sv({...d,studyPlan:p,td,leiReading:lr,xp:(d.xp||0)+(f.done?10:-10)})
  };

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:8}}>
      <div><h2 style={{fontSize:24,fontWeight:800}}>Meu Cronograma · TQR-D</h2><p style={{color:"#888",fontSize:13}}>Modo {d.priorityMode} · ~3h30/dia · Teoria · Questoes · Revisao · Discursiva</p></div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}><span className="lb" style={{margin:0}}>Semanas</span><input className="inp" type="number" value={gW} onChange={e=>sGW(e.target.value)} style={{width:50,padding:"4px 8px"}}/></div>
        <button className="btn bs2 bsm" onClick={()=>setShowImport(true)}>Importar</button>
        <button className="btn bs2 bsm" onClick={()=>setShowAdd(true)}>+ Meta</button>
        <button className="btn bs2 bsm" onClick={()=>setShowMarkDone(true)}>Topicos feitos</button>
        <button className="btn" style={{background:"#7c3aed",color:"#fff",padding:"5px 10px",fontSize:11,fontWeight:700}} onClick={()=>{if(confirm("Carregar o cronograma v3 (16 semanas, 496 metas, 11/mai a 30/ago/2026, 3 concursos: SEDES DF + ARR + PRF)? O cronograma atual sera SUBSTITUIDO."))sv({...d,studyPlan:expandFaseTQRD()})}}>Fase v3 · 3 concursos</button>
        <button className="btn bp bsm" onClick={genTQRD}>{sp.length>0?"Continuar plano":"Gerar plano TQR-D"}</button>
        {sp.length>0&&<button className="btn bdn bsm" onClick={()=>{if(confirm("Apagar TODO o cronograma?"))sv({...d,studyPlan:[]})}}>Zerar</button>}
      </div>
    </div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8,fontSize:11}}>
      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#dc2626",borderRadius:2}}/>Teoria</span>
      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#7c3aed",borderRadius:2}}/>Revisao</span>
      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#fcbf49",borderRadius:2}}/>Discursiva</span>
      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#0f766e",borderRadius:2}}/>Lei Seca</span>
      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#b45309",borderRadius:2}}/>Simulado</span>
    </div>
    <div className="week-nav">
      <button onClick={()=>setWeekOff(w=>w-1)}>&lt; Anterior</button>
      <button onClick={()=>setWeekOff(0)} style={{fontWeight:800}}>Hoje</button>
      <button onClick={()=>setWeekOff(w=>w+1)}>Proxima &gt;</button>
      <span style={{fontSize:13,color:"#888",marginLeft:8}}>{fBShort(days[0])} — {fBShort(days[6])}</span>
    </div>
    <div className="week-grid">
      {days.map(ds=>{
        const dow0=dw(ds);const isToday=ds===today;const isSun=dow0===0;const isSat=dow0===6;
        const items=sp.filter(s=>s.date===ds);
        return<div key={ds} className={`week-day ${isToday?"today":""} ${isSun?"sunday":""} ${isSat?"saturday":""}`}>
          <div className="wd-header">{dayName(ds)}</div>
          <div className="wd-num" style={{color:isToday?"#2563eb":isSun?"#b45309":isSat?"#7c3aed":"#1a1a2e"}}>{dayNum(ds)}</div>
          {items.length===0&&<div style={{fontSize:11,color:"#ccc",textAlign:"center",padding:"8px 0"}}>Sem metas</div>}
          {items.map(s=>{const phClr=pC(s.phase);const subClr=s.clr||"#888";return<div key={s.id} className={`meta-card ${s.done?"done":""}`}
            style={{background:subClr+"15",borderLeftColor:phClr,color:"#1a1a2e"}}
            onClick={()=>onOpenMeta(s)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:4}}>
              <span className="mc-phase" style={{color:phClr,fontWeight:800,fontSize:9,letterSpacing:.5,textTransform:"uppercase"}}>{pLabel(s.phase)}</span>
              <span style={{fontSize:9,color:"#999"}}>{s.dur}min</span>
            </div>
            <div className="mc-topic" style={{color:subClr,fontSize:11,fontWeight:700,marginTop:2}}>{["FLASHCARDS","SIMULADO","DISCURSIVA","LEI SECA"].includes(s.subject)?"":s.subject}</div>
            <div className="mc-topic" style={{color:"#1a1a2e",fontSize:11,marginTop:1,lineHeight:1.3}}>{s.tn}</div>
            <div style={{display:"flex",gap:4,marginTop:4}}>
              <button onClick={e=>{e.stopPropagation();setMoveItem(s.id);setMoveTo(s.date)}} style={{background:"none",border:"none",cursor:"pointer",color:"#bbb",padding:0,display:"flex"}} title="Mover"><Ic name="chevR" size={12}/></button>
              <button onClick={e=>{e.stopPropagation();rm(s.id)}} style={{background:"none",border:"none",cursor:"pointer",color:"#dbb",padding:0,display:"flex"}} title="Remover"><Ic name="trash" size={12}/></button>
            </div>
          </div>})}
        </div>})}
    </div>
    {sp.length===0&&<div className="cd tc" style={{marginTop:20,padding:32}}><h3 style={{fontSize:18,marginBottom:8}}>Gere seu cronograma TQR-D!</h3><p style={{color:"#888",fontSize:14}}>Clique em "Gerar plano TQR-D" para criar {gW} semanas no modo {d.priorityMode}.</p></div>}
    {/* IMPORT modal */}
    {showImport&&<div className="modal-bg" onClick={()=>setShowImport(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:600,maxHeight:"85vh",overflowY:"auto"}}>
        <h3 style={{fontSize:18,fontWeight:800,marginBottom:4}}>Importar Cronograma</h3>
        <p style={{color:"#888",fontSize:12,marginBottom:8}}>Separador: <code>|</code>, <code>TAB</code> ou <code>;</code></p>
        <div style={{background:"#f8f7f4",border:"1px solid #e5e3de",borderRadius:8,padding:10,fontSize:11,fontFamily:"'JetBrains Mono',monospace",marginBottom:10,lineHeight:1.6}}>
          DATA | MATERIA | TOPICO | FASE | DURACAO<br/>
          2026-05-12 | Regimento Interno Camara | Mesa Diretora | T | 90<br/><br/>
          Fases: T (teoria), Q (questoes), R (revisao), D2 (discursiva), LS (lei seca), SIM (simulado)
        </div>
        <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder="Cole aqui..." style={{width:"100%",minHeight:180,padding:10,borderRadius:8,border:"1px solid #ddd",fontFamily:"'JetBrains Mono',monospace",fontSize:12,resize:"vertical",lineHeight:1.6}}/>
        {importMsg&&<div style={{marginTop:8,padding:"8px 12px",background:importMsg.includes("importadas")?"#dcfce7":"#fef3c7",borderRadius:8,fontSize:13,fontWeight:600,color:importMsg.includes("importadas")?"#059669":"#92400e"}}>{importMsg}</div>}
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button className="btn bp" onClick={doImport} style={{flex:1}}>Importar</button>
          <button className="btn bs2" onClick={()=>{setShowImport(false);setImportText("");setImportMsg("")}}>Cancelar</button>
        </div>
      </div>
    </div>}
    {/* ADD modal */}
    {showAdd&&<div className="modal-bg" onClick={()=>setShowAdd(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:420}}>
        <h3 style={{fontSize:18,fontWeight:800,marginBottom:12}}>Adicionar Meta</h3>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><span className="lb">Data</span><input className="inp" type="date" value={addDate} onChange={e=>setAddDate(e.target.value)}/></div>
          <div><span className="lb">Materia</span>
            <select className="sel" value={addSubj} onChange={e=>setAddSubj(e.target.value)}>
              <option value="">Selecione...</option>
              {CUR.filter(c=>!c.dormant).map((c,i)=><option key={i} value={c.s}>{c.s} ({c.g.toUpperCase()})</option>)}
              <option value="LEI SECA">LEI SECA</option>
              <option value="DISCURSIVA">DISCURSIVA</option>
              <option value="SIMULADO">SIMULADO</option>
              <option value="FLASHCARDS">FLASHCARDS</option>
            </select>
          </div>
          <div><span className="lb">Topico</span><input className="inp" value={addTopic} onChange={e=>setAddTopic(e.target.value)} placeholder="Ex: Mesa Diretora"/></div>
          <div className="g2">
            <div><span className="lb">Fase</span>
              <select className="sel" value={addPhase} onChange={e=>setAddPhase(e.target.value)}>
                <option value="T">T - Teoria + Questoes</option>
                <option value="R">R - Revisao</option>
                <option value="D2">D2 - Discursiva</option>
                <option value="LS">LS - Lei Seca</option>
                <option value="SIM">SIM - Simulado</option>
              </select>
            </div>
            <div><span className="lb">Duracao (min)</span><input className="inp" type="number" value={addDur} onChange={e=>setAddDur(e.target.value)}/></div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button className="btn bp" onClick={doAdd} style={{flex:1}} disabled={!addSubj||!addTopic}>Adicionar</button>
          <button className="btn bs2" onClick={()=>setShowAdd(false)}>Cancelar</button>
        </div>
      </div>
    </div>}
    {/* MOVE modal */}
    {moveItem&&<div className="modal-bg" onClick={()=>setMoveItem(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:8}}>Mover meta para outro dia</h3>
        <p style={{fontSize:12,color:"#888",marginBottom:10}}>{(()=>{const item=sp.find(s=>s.id===moveItem);return item?item.subject+" > "+item.tn:""})()}</p>
        <div><span className="lb">Nova data</span><input className="inp" type="date" value={moveTo} onChange={e=>setMoveTo(e.target.value)}/></div>
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button className="btn bp" onClick={doMove} disabled={!moveTo}>Mover</button>
          <button className="btn bs2" onClick={()=>setMoveItem(null)}>Cancelar</button>
        </div>
      </div>
    </div>}
    {/* MARK DONE modal */}
    {showMarkDone&&<div className="modal-bg" onClick={()=>setShowMarkDone(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:520,maxHeight:"85vh",overflowY:"auto"}}>
        <h3 style={{fontSize:18,fontWeight:800,marginBottom:4}}>Topicos ja estudados</h3>
        <p style={{color:"#888",fontSize:12,marginBottom:14}}>Marque o que ja domina. O cronograma vai PULAR.</p>
        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
          <button className="btn bdn bsm" onClick={()=>{if(confirm("Desmarcar TODOS?"))sv({...d,td:{}})}}>Limpar tudo</button>
        </div>
        {CUR.filter(c=>!c.dormant).map((c,idx)=>{const ci=CUR.indexOf(c);const td=d.td||{};const doneCount=c.t.filter((_,ti)=>td[tid(ci,ti)]).length;
          return<div key={ci} style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div className="sd" style={{background:c.c}}/>
              <span style={{fontSize:13,fontWeight:700}}>{c.s}</span>
              <span style={{fontSize:10,color:"#888",padding:"1px 6px",background:"#f0eeea",borderRadius:6}}>{c.g.toUpperCase()}</span>
              <span style={{fontSize:11,color:"#888",marginLeft:"auto"}}>{doneCount}/{c.t.length}</span>
            </div>
            {c.t.map((t,ti)=>{const k=tid(ci,ti);const done=!!(d.td||{})[k];
              return<div key={k} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0 4px 18px",cursor:"pointer"}} onClick={()=>{const td={...(d.td||{})};td[k]=!done;sv({...d,td})}}>
                <div style={{width:18,height:18,borderRadius:4,background:done?c.c:"transparent",border:done?"none":"2px solid #ccc",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{done&&<Ic name="check" size={12} color="#fff"/>}</div>
                <span style={{fontSize:12,color:done?"#aaa":"#1a1a2e",textDecoration:done?"line-through":"none"}}>{t[0]}</span>
              </div>;
            })}
          </div>;
        })}
        <div style={{display:"flex",gap:8,marginTop:12,position:"sticky",bottom:0,background:"#fff",padding:"10px 0"}}>
          <button className="btn bp" onClick={()=>{setShowMarkDone(false);genTQRD()}} style={{flex:1}}>Salvar e gerar cronograma</button>
          <button className="btn bs2" onClick={()=>setShowMarkDone(false)}>Fechar</button>
        </div>
      </div>
    </div>}
  </div>;
}

// META DETAIL SCREEN
// ═══════════════════════════════════════════════════════════════════════
function MetaDetail({meta,d,sv,onBack,pRn,setPRn,pTl,setPTl,pMd,setPMd,pSw,PM,pMn,pSc,pPc}){
  const sp=fixArr(d.studyPlan);
  const isDone=sp.find(s=>s.id===meta.id)?.done;
  const tog=()=>{
    const p=sp.map(s=>s.id===meta.id?{...s,done:!s.done}:s);
    const f=p.find(s=>s.id===meta.id);
    const td={...(d.td||{})};
    if(f&&f.done&&f.phase==="T"&&f.ci!==undefined&&f.ti!==undefined)td[f.tkey]=true;
    const lr={...(d.leiReading||{})};
    if(f&&meta.leiBlocoId){lr[meta.leiBlocoId]=f.done}
    sv({...d,studyPlan:p,td,leiReading:lr,xp:(d.xp||0)+(f.done?10:-10)})
  };
  // Build orientation: phase intro + specific topic guidance + bloco focus (Lei Seca)
  let orient="";
  if(PHASE_ORIENT[meta.phase])orient=PHASE_ORIENT[meta.phase]+"\n\n";
  if(meta.subject==="LEI SECA"&&meta.leiBlocoId){
    let bloco=null;for(const lei of LEIS_CONTENT){const b=lei.blocos.find(bl=>bl.id===meta.leiBlocoId);if(b){bloco=b;break}}
    if(bloco)orient+="ARTIGOS: "+bloco.artigos+".\n\nFOCO: "+bloco.foco;
  } else {
    const specific=ORIENT[meta.subject+"::"+meta.tn];
    if(specific)orient+=specific;
  }
  if(!orient.trim())orient="Estude este topico com atencao. Faca anotacoes dos pontos principais e resolva questoes CEBRASPE para fixar o conteudo.";
  return<div className="meta-detail">
    <button onClick={onBack} className="btn bs2" style={{marginBottom:16,display:"flex",alignItems:"center",gap:6}}><Ic name="back" size={16}/>Voltar ao Cronograma</button>
    <div className="md-header" style={{background:meta.clr||"#1a1a2e"}}>
      <div style={{fontSize:12,opacity:.8,marginBottom:4}}>{pLabel(meta.phase)}</div>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:4}}>{meta.subject}</h2>
      <p style={{fontSize:14,opacity:.9}}>Topico: {meta.tn}</p>
    </div>
    <div className="md-info">
      <div className="md-info-box"><div style={{fontSize:11,color:"#888",fontWeight:600}}>Data</div><div style={{fontSize:18,fontWeight:800,marginTop:4}}>{fB(meta.date)}</div></div>
      <div className="md-info-box"><div style={{fontSize:11,color:"#888",fontWeight:600}}>Duracao</div><div style={{fontSize:18,fontWeight:800,marginTop:4}}>{meta.dur} min</div></div>
    </div>
    <div className="md-timer">
      <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Cronometro</div>
      <div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:16}}>{PM.map((m,i)=><button key={i} onClick={()=>pSw(i)} style={{padding:"6px 14px",borderRadius:8,border:"2px solid "+(pMd===i?m.c:"#e5e3de"),background:pMd===i?m.c+"15":"#fff",color:pMd===i?m.c:"#999",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{m.l} ({m.d/60}m)</button>)}</div>
      <div style={{position:"relative",display:"inline-block",marginBottom:12}}>
        <svg width="160" height="160" viewBox="0 0 160 160"><circle cx="80" cy="80" r="70" fill="none" stroke="#e8e6e1" strokeWidth="7"/><circle cx="80" cy="80" r="70" fill="none" stroke={PM[pMd].c} strokeWidth="7" strokeDasharray={2*Math.PI*70} strokeDashoffset={2*Math.PI*70*(1-pPc/100)} strokeLinecap="round" transform="rotate(-90 80 80)" className="tr"/></svg>
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)"}}><div style={{fontSize:36,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:PM[pMd].c}}>{String(pMn).padStart(2,"0")}:{String(pSc).padStart(2,"0")}</div></div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"center"}}>
        <button className="btn" style={{background:PM[pMd].c,color:"#fff",padding:"10px 24px",fontSize:14,display:"flex",alignItems:"center",gap:6}} onClick={()=>setPRn(!pRn)}><Ic name={pRn?"pause":"play"} size={16}/>{pRn?"Pausar":"Iniciar"}</button>
        <button className="btn bs2" onClick={()=>{setPTl(PM[pMd].d);setPRn(false)}}><Ic name="reset" size={16}/></button>
      </div>
    </div>
    <div className="md-orient">
      <h3>Orientacoes de Estudo</h3>

}

// QUESTOES (preservado)
// ═══════════════════════════════════════════════════════════════════════
function Quest({d,sv}){
  const[dt,setDt]=useState(lT());const[ci,setCi]=useState(0);const[ti,setTi]=useState(0);
  const[ac,setAc]=useState("");const[er,setEr]=useState("");const[msg,setMsg]=useState("");
  const qs=d.questionStats||{};const q=fixArr(d.questions);
  const activeSubjs=CUR.filter(c=>!c.dormant);
  const safeCi=Math.min(ci,activeSubjs.length-1);
  const curSubj=activeSubjs[safeCi];
  const realCi=CUR.indexOf(curSubj);
  const safeTi=Math.min(ti,curSubj.t.length-1);
  const registrar=()=>{
    const nAc=parseInt(ac)||0;const nEr=parseInt(er)||0;if(nAc===0&&nEr===0)return;
    const sub=curSubj.s;const topic=curSubj.t[safeTi][0];const st={...qs};if(!st[sub])st[sub]={correct:0,total:0};st[sub].correct+=nAc;st[sub].total+=nAc+nEr;
    const rnd=()=>"q_"+Date.now()+"_"+Math.random().toString(36).substr(2,9);
    const newQ=[...q];
    for(let i=0;i<nAc;i++)newQ.push({id:rnd(),date:dt,subject:sub,topic,correct:true});
    for(let i=0;i<nEr;i++)newQ.push({id:rnd(),date:dt,subject:sub,topic,correct:false});
    sv({...d,questions:newQ,questionStats:st,xp:(d.xp||0)+nAc*5+nEr*2});
    setMsg(nAc+" certas, "+nEr+" erradas em "+sub);setAc("");setEr("");setTimeout(()=>setMsg(""),4000);
  };
  const byDate={};q.forEach(x=>{const dd=x.date||"?";if(!byDate[dd])byDate[dd]=[];byDate[dd].push(x)});
  const sortedDates=Object.keys(byDate).sort().reverse();
  return<div>
    <h2 style={{fontSize:24,fontWeight:800,marginBottom:20}}>Questoes</h2>
    <div className="g4" style={{marginBottom:20}}>{[{l:"Total",v:q.length,c:"#2563eb"},{l:"Acertos",v:q.filter(x=>x.correct).length,c:"#059669"},{l:"Erros",v:q.filter(x=>!x.correct).length,c:"#dc2626"},{l:"Hoje",v:q.filter(x=>x.date===lT()).length,c:"#d97706"}].map((s,i)=><div className="cd" key={i} style={{padding:12}}><div style={{fontSize:10,color:"#999",fontWeight:600,textTransform:"uppercase"}}>{s.l}</div><div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div></div>)}</div>
    <div className="cd">
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Registrar</h3>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div><span className="lb">Data</span><input className="inp" type="date" value={dt} onChange={e=>setDt(e.target.value)} style={{width:150}}/></div>
        <div style={{flex:1,minWidth:130}}><span className="lb">Materia</span><select className="sel" value={safeCi} onChange={e=>{setCi(parseInt(e.target.value));setTi(0)}}>{activeSubjs.map((c,i)=><option key={i} value={i}>{c.s}</option>)}</select></div>
        <div style={{flex:1,minWidth:150}}><span className="lb">Topico</span><select className="sel" value={safeTi} onChange={e=>setTi(parseInt(e.target.value))}>{curSubj.t.map((t,i)=><option key={i} value={i}>{t[0]}</option>)}</select></div>
      </div>
      <div className="qi"><div className="qi-box"><span className="lb" style={{color:"#059669"}}>Acertos</span><input className="qi-inp green" type="number" min="0" value={ac} onChange={e=>setAc(e.target.value)} placeholder="0"/></div>
        <div className="qi-box"><span className="lb" style={{color:"#dc2626"}}>Erros</span><input className="qi-inp red" type="number" min="0" value={er} onChange={e=>setEr(e.target.value)} placeholder="0"/></div>
        <div className="qi-box"><span className="lb">Total</span><div style={{fontSize:24,fontWeight:800}}>{(parseInt(ac)||0)+(parseInt(er)||0)}</div></div></div>
      <button className="btn bp" onClick={registrar} style={{width:"100%",marginTop:14,padding:12,fontSize:14}} disabled={!ac&&!er}>Registrar</button>
      {msg&&<div style={{marginTop:10,padding:"10px 14px",background:"#dcfce7",borderRadius:8,color:"#059669",fontWeight:600,fontSize:13}}>{msg}</div>}
    </div>
    {sortedDates.length>0&&<div className="cd"><h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Historico</h3>
      {sortedDates.slice(0,10).map(dd=>{const items=byDate[dd];const ok=items.filter(x=>x.correct).length;const tot=items.length;const pct=Math.round(ok/tot*100);
        const subGrp={};items.forEach(x=>{const k=x.subject;if(!subGrp[k])subGrp[k]={c:0,e:0};if(x.correct)subGrp[k].c++;else subGrp[k].e++});
        return<div key={dd} style={{marginBottom:14,paddingBottom:10,borderBottom:"1px solid #f0eeea"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:13,fontWeight:700}}>{dd===lT()?"Hoje":fB(dd)}</span>
            <span style={{fontSize:12}}><span style={{color:"#059669",fontWeight:700}}>{ok}OK</span> <span style={{color:"#dc2626",fontWeight:700}}>{tot-ok}X</span> <span className="bdg" style={{background:(pct>=70?"#059669":pct>=50?"#d97706":"#dc2626")+"18",color:pct>=70?"#059669":pct>=50?"#d97706":"#dc2626"}}>{pct}%</span></span>
          </div>
          {Object.entries(subGrp).map(([sub,v])=><div key={sub} style={{fontSize:11,color:"#888",paddingLeft:10}}>{sub}: {v.c} certas, {v.e} erradas</div>)}
        </div>})}
    </div>}
  </div>;
}

// ═══════════════════════════════════════════════════════════════════════
// FLASHCARDS — sistema de empurrar agressivo
// ═══════════════════════════════════════════════════════════════════════
function Flash({d,sv}){
  // Default view: review (since user has medium adherence, force-start in review mode)
  const[vw,setVw]=useState("review");const[fci,setFci]=useState(0);const[fti,setFti]=useState(0);
  const[fr,setFr]=useState("");const[bk,setBk]=useState("");const[fl,setFl]=useState(false);const[idx,setIdx]=useState(0);
  const[impSub,setImpSub]=useState(0);const[impTi,setImpTi]=useState(0);const[impMsg,setImpMsg]=useState("");
  const[dailyLimit,setDailyLimit]=useState(DAILY_FLASH_LIMIT);
  const[showAll,setShowAll]=useState(false);
  const fileRef=useRef(null);const fc=fixArr(d.flashcards);
  const activeSubjs=CUR.filter(c=>!c.dormant);
  const safeFci=Math.min(fci,activeSubjs.length-1);
  const curSubj=activeSubjs[safeFci];
  const safeFti=Math.min(fti,curSubj.t.length-1);
  const subN=curSubj.s;const topN=curSubj.t[safeFti][0];
  const dueCards=fc.filter(f=>f&&isDueCard(f));
  const newCards=fc.filter(f=>f&&isNewCard(f));
  const dailyNew=newCards.slice(0,NEW_PER_DAY);
  const allReviewDeck=[...dueCards,...dailyNew];
  // Smart daily limit: cap at dailyLimit unless showAll
  const reviewDeck=showAll?allReviewDeck:allReviewDeck.slice(0,dailyLimit);
  const topicAll=fc.filter(f=>f&&f.subject===subN&&f.topic===topN);
  const topicStudy=[...topicAll.filter(f=>isDueCard(f)),...topicAll.filter(f=>isNewCard(f))];
  const deck=vw==="review"?reviewDeck:topicStudy;const cur=deck[idx]||null;
  const addC=()=>{if(!fr.trim()||!bk.trim())return;sv({...d,flashcards:[...fc,{id:Date.now(),front:fr,back:bk,subject:subN,topic:topN,ef:2.5,interval:0,repetitions:0,nextReview:null,lastReview:null}]});setFr("");setBk("")};
  const rev=q=>{if(!cur)return;const u=sm2(cur,q);sv({...d,flashcards:fc.map(f=>f.id===cur.id?u:f)});setFl(false);setIdx(i=>i+1)};
  const delOne=id=>{sv({...d,flashcards:fc.filter(f=>f.id!==id)})};
  const impF=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();
    reader.onload=ev=>{const lines=ev.target.result.split("\n").filter(l=>l.trim());let n=0;const cards=[...fc];const iSubj=activeSubjs[impSub];const iS=iSubj.s;const iT=iSubj.t[Math.min(impTi,iSubj.t.length-1)][0];
      lines.forEach(line=>{const p=line.split("\t");if(p.length>=2){cards.push({id:Date.now()+n,front:p[0].trim(),back:p[1].trim(),tip:p[2]?p[2].trim():"",subject:iS,topic:iT,ef:2.5,interval:0,repetitions:0,nextReview:null,lastReview:null});n++}});
      sv({...d,flashcards:cards});setImpMsg(n+" importados");setTimeout(()=>setImpMsg(""),3000)};reader.readAsText(file);e.target.value=""};
  const rvCard=()=>{if(!cur)return null;return<div>
    <div style={{fontSize:12,color:"#888",marginBottom:10}}>{idx+1}/{deck.length} | {cur.subject} &gt; {cur.topic} {isNewCard(cur)&&<span className="new-badge">NOVO</span>}</div>
    <div className="cd tc" style={{padding:32,cursor:"pointer",minHeight:160,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}} onClick={()=>setFl(!fl)}>
      <div style={{display:"flex",gap:6,marginBottom:10}}><span className="bdg" style={{background:"#2563eb18",color:"#2563eb"}}>{cur.subject}</span><span className="bdg" style={{background:"#7c3aed18",color:"#7c3aed"}}>{cur.topic}</span></div>
      <div style={{fontSize:18,fontWeight:600,margin:"8px 0"}}>{fl?cur.back:cur.front}</div>
      {fl&&cur.tip&&<div style={{marginTop:14,padding:"10px 14px",background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:8,fontSize:13,color:"#92400e",maxWidth:480}}><strong>Pegadinha CEBRASPE:</strong> {cur.tip}</div>}
      <div style={{fontSize:12,color:"#bbb",marginTop:14}}>{fl?"Resposta":"Toque para revelar"}</div>
    </div>
    {fl&&<div style={{display:"flex",gap:6,marginTop:14}}>{[{q:1,l:"Esqueci",c:"#dc2626",t:"Volta em 1 dia"},{q:3,l:"Dificil",c:"#d97706",t:"Curto"},{q:4,l:"Bom",c:"#2563eb",t:"Padrao"},{q:5,l:"Facil",c:"#059669",t:"Grande"}].map(b=><button key={b.q} className="btn" style={{background:b.c,color:"#fff",flex:1,padding:"12px 8px",display:"flex",flexDirection:"column",gap:2}} onClick={()=>rev(b.q)}><div style={{fontWeight:700}}>{b.l}</div><div style={{fontSize:10,opacity:.85}}>{b.t}</div></button>)}</div>}
  </div>};
  // Empty / done states
  const sessionFinished=vw==="review"&&deck.length>0&&idx>=deck.length;
  const remaining=allReviewDeck.length-deck.length;
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <div><h2 style={{fontSize:24,fontWeight:800}}>Flashcards · SM-2</h2><p style={{color:"#888",fontSize:13}}>{fc.length} total · <strong style={{color:dueCards.length>0?"#dc2626":"#888"}}>{dueCards.length} vencidos</strong> · {dailyNew.length} novos hoje · limite diario {dailyLimit}</p></div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{["review","study","add","import","list"].map(v=><button key={v} className={`btn bsm ${vw===v?"bp":"bs2"}`} onClick={()=>{setVw(v);setIdx(0);setFl(false)}}>{v==="review"?"Revisao do dia":v==="study"?"Topico":v==="add"?"Criar":v==="import"?"Importar":"Lista"}</button>)}</div>
    </div>
    {(vw==="study"||vw==="add")&&<div className="cd" style={{marginBottom:14}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{flex:1,minWidth:130}}><span className="lb">Materia</span><select className="sel" value={safeFci} onChange={e=>{setFci(parseInt(e.target.value));setFti(0);setIdx(0);setFl(false)}}>{activeSubjs.map((c,i)=><option key={i} value={i}>{c.s}</option>)}</select></div>
        <div style={{flex:1,minWidth:150}}><span className="lb">Topico</span><select className="sel" value={safeFti} onChange={e=>{setFti(parseInt(e.target.value));setIdx(0);setFl(false)}}>{curSubj.t.map((t,i)=><option key={i} value={i}>{t[0]}</option>)}</select></div>
      </div>
    </div>}
    {vw==="review"&&(allReviewDeck.length===0?
      <div className="cd tc" style={{padding:40}}><div style={{fontSize:40,marginBottom:10,color:"#059669"}}>OK</div><h3>Tudo em dia.</h3><p style={{color:"#888",fontSize:13,marginTop:8}}>Sem cards vencidos hoje. Volte amanha ou importe novos cards.</p></div>:
      sessionFinished?
      <div className="cd tc" style={{padding:40}}><div style={{fontSize:40,marginBottom:10,color:"#fcbf49"}}>★</div><h3>Sessao concluida</h3><p style={{color:"#888",fontSize:13,margin:"8px 0"}}>{deck.length} cards revisados.</p>{remaining>0&&<><p style={{color:"#888",fontSize:13,marginBottom:14}}>Ainda restam <strong>{remaining} cards</strong>. Pode parar (o SM-2 retoma amanha) ou continuar agora.</p><button className="btn bp" onClick={()=>{setShowAll(true);setIdx(0)}}>Continuar com os {remaining} restantes</button></>}{remaining===0&&<p style={{color:"#888",fontSize:13}}>Nada mais vencido. Excelente trabalho.</p>}</div>:
      rvCard())}
    {vw==="study"&&(topicStudy.length===0?<div className="cd tc" style={{padding:30}}><h3>Nenhum card pendente neste topico</h3></div>:rvCard())}
    {vw==="add"&&<div className="cd"><div style={{display:"flex",flexDirection:"column",gap:10}}><div><span className="lb">Frente</span><textarea className="ta" value={fr} onChange={e=>setFr(e.target.value)} placeholder="Pergunta..." style={{minHeight:70}}/></div><div><span className="lb">Verso</span><textarea className="ta" value={bk} onChange={e=>setBk(e.target.value)} placeholder="Resposta..." style={{minHeight:70}}/></div><button className="btn bp" onClick={addC}>Adicionar</button></div></div>}
    {vw==="import"&&<div className="cd"><h3 style={{fontSize:14,fontWeight:700,marginBottom:6}}>Importar (formato TAB)</h3>
      <p style={{fontSize:11,color:"#888",marginBottom:12}}>Formato por linha: <code>pergunta⇥resposta⇥dica</code> (a dica e opcional).</p>
      <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap",marginBottom:12}}>
        <div style={{flex:1,minWidth:130}}><span className="lb">Materia</span><select className="sel" value={impSub} onChange={e=>{setImpSub(parseInt(e.target.value));setImpTi(0)}}>{activeSubjs.map((c,i)=><option key={i} value={i}>{c.s}</option>)}</select></div>
        <div style={{flex:1,minWidth:150}}><span className="lb">Topico</span><select className="sel" value={impTi} onChange={e=>setImpTi(parseInt(e.target.value))}>{activeSubjs[impSub].t.map((t,i)=><option key={i} value={i}>{t[0]}</option>)}</select></div>
        <button className="btn bp" onClick={()=>fileRef.current?.click()}><Ic name="upload" size={14}/></button>
        <input ref={fileRef} type="file" accept=".txt,.csv,.tsv" onChange={impF} style={{display:"none"}}/>
      </div>
      {impMsg&&<div style={{padding:"10px",background:"#dcfce7",borderRadius:8,color:"#059669",fontWeight:600,fontSize:13}}>{impMsg}</div>}
    </div>}
    {vw==="list"&&<div>
      {(()=>{
        const bySubject={};
        fc.forEach(f=>{if(!f)return;const s=f.subject||"Sem materia";if(!bySubject[s])bySubject[s]=[];bySubject[s].push(f)});
        const allSubjects=Object.keys(bySubject).sort();
        return allSubjects.map(sub=>{
          const subCards=bySubject[sub];
          const curMatch=CUR.find(c=>c.s===sub);
          const clr=curMatch?curMatch.c:"#888";
          const byTopic={};subCards.forEach(f=>{const t=f.topic||"Sem topico";if(!byTopic[t])byTopic[t]=[];byTopic[t].push(f)});
          return<div key={sub} className="cd">
            <h3 style={{fontSize:14,fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
              <div className="sd" style={{background:clr}}/>{sub} ({subCards.length})
              <button className="btn bdn bsm" style={{marginLeft:"auto"}} onClick={()=>{if(confirm("Excluir TODOS de "+sub+"?"))sv({...d,flashcards:fc.filter(f=>f.subject!==sub)})}}>Excluir todos</button>
            </h3>
            {Object.entries(byTopic).map(([topic,cards])=><div key={topic} style={{marginBottom:14,paddingBottom:10,borderBottom:"1px solid #f0eeea"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:700,color:"#555"}}>{topic} ({cards.length})</span>
                <button className="btn bdn bsm" onClick={()=>{if(confirm("Excluir "+cards.length+" de "+topic+"?"))sv({...d,flashcards:fc.filter(f=>!(f.subject===sub&&f.topic===topic))})}}>Excluir topico</button>
              </div>
              {cards.map(f=><div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"6px 0",borderBottom:"1px solid #f5f4f0",gap:8}}>
                <div style={{flex:1,fontSize:12}}>
                  <strong>{f.front}</strong>
                  <div style={{color:"#888",marginTop:2,fontSize:11}}>{f.back}</div>
                  {f.tip&&<div style={{color:"#92400e",marginTop:2,fontSize:10,fontStyle:"italic"}}>Dica: {f.tip}</div>}
                </div>
                <button onClick={()=>delOne(f.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",flexShrink:0}} title="Excluir"><Ic name="trash" size={14}/></button>
              </div>)}
            </div>)}
          </div>
        });
      })()}
      {fc.length===0&&<p style={{color:"#bbb",textAlign:"center",marginTop:40}}>Nenhum cartao</p>}
    </div>}
  </div>;
}

// DISCURSIVA — Novo modulo
// ═══════════════════════════════════════════════════════════════════════
function Discursiva({d,sv}){
  const[form,setForm]=useState({tema:"",corpo:"",correcao:"",nota:""});
  const[expandedId,setExpandedId]=useState(null);
  const redacoes=fixArr(d.redacoes);
  const save=()=>{
    if(!form.tema.trim()||!form.corpo.trim())return;
    const nova={id:Date.now().toString(),date:lT(),...form};
    sv({...d,redacoes:[nova,...redacoes],xp:(d.xp||0)+30});
    setForm({tema:"",corpo:"",correcao:"",nota:""});
  };
  const remove=id=>{if(confirm("Apagar esta redacao?"))sv({...d,redacoes:redacoes.filter(r=>r.id!==id)})};
  // Word count
  const wordCount=form.corpo.trim()?form.corpo.trim().split(/\s+/).length:0;
  const lineEstim=Math.round(wordCount/8);// ~8 palavras por linha em manuscrito padrao
  return<div>
    <h2 style={{fontSize:24,fontWeight:800,marginBottom:4}}>Discursiva · Redacao</h2>
    <p style={{color:"#888",fontSize:13,marginBottom:20}}>Bloco fixo de sabado, 1h30. Cada redacao registrada vira material de revisao.</p>
    <div className="cd">
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Nova redacao</h3>
      <div><span className="lb">Tema</span>
        <input className="inp" value={form.tema} onChange={e=>setForm({...form,tema:e.target.value})} placeholder="Ex: O papel do Poder Legislativo na fiscalizacao do Executivo" style={{marginBottom:12}}/>
      </div>
      <div><span className="lb">Texto da redacao</span>
        <textarea className="ta" value={form.corpo} onChange={e=>setForm({...form,corpo:e.target.value})} rows={14} placeholder="Escreva sua redacao aqui..."/>
        <div style={{fontSize:11,color:"#888",marginTop:4,textAlign:"right"}}>{wordCount} palavras · ~{lineEstim} linhas manuscritas</div>
      </div>
      <div style={{marginTop:12}}><span className="lb">Autocorrecao / observacoes</span>
        <textarea className="ta" value={form.correcao} onChange={e=>setForm({...form,correcao:e.target.value})} rows={4} placeholder="Quais erros encontrou? Onde poderia melhorar? Comparou com o padrao CEBRASPE?"/>
      </div>
      <div style={{marginTop:12}}><span className="lb">Nota estimada</span>
        <input className="inp" value={form.nota} onChange={e=>setForm({...form,nota:e.target.value})} placeholder="Ex: 7,5 / 10" style={{maxWidth:200}}/>
      </div>
      <div style={{marginTop:14}}>
        <button className="btn bp" onClick={save} disabled={!form.tema||!form.corpo}>Salvar redacao</button>
      </div>
    </div>
    <div className="cd">
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Historico ({redacoes.length})</h3>
      {redacoes.length===0?<div style={{color:"#bbb",fontStyle:"italic",fontSize:13}}>Nenhuma redacao registrada ainda.</div>:
        redacoes.map(r=>{const isExp=expandedId===r.id;return<div key={r.id} className="disc-item" onClick={()=>setExpandedId(isExp?null:r.id)}>
          <div className="disc-summary">
            <strong>{r.tema}</strong>
            <span style={{fontSize:12,color:"#888"}}>{r.date}{r.nota&&" · "+r.nota}</span>
          </div>
          {isExp&&<>
            <div className="disc-body">{r.corpo}</div>
            {r.correcao&&<div className="disc-corr"><strong>Autocorrecao:</strong> {r.correcao}</div>}
            <button onClick={e=>{e.stopPropagation();remove(r.id)}} className="btn bdn bsm" style={{marginTop:10}}>Apagar</button>
          </>}
        </div>})}
    </div>
  </div>;
}
