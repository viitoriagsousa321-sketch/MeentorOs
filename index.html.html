<title>MentorOS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f7f4;--cd:#fff;--bd:#e5e3de;--tx:#1a1a2e;--mt:#888;--lt:#fafaf8}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx)}
.app{display:flex;min-height:100vh}
/* Sidebar */
.sb{background:var(--cd);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;transition:width .25s;overflow:hidden;flex-shrink:0;z-index:10}
.sb.c{width:52px;min-width:52px}.sb.e{width:210px;min-width:210px}
.sh{padding:14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8;min-height:52px}
.sh h1{font-size:18px;font-weight:800;letter-spacing:-.5px;white-space:nowrap;flex:1}
.st0{background:none;border:none;cursor:pointer;color:var(--mt);padding:4px;display:flex}
.sn{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nb{display:flex;align-items:center;gap:9px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;white-space:nowrap;overflow:hidden;min-height:36px;transition:all .15s;color:#666;background:transparent}
.sb.c .nb{justify-content:center;padding:8px 0}.sb.e .nb{padding:8px 11px}
.nb.on{background:var(--tx);color:#fff;font-weight:600}.nb:hover:not(.on){background:#f0eeea}
.sf{padding:10px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:6}
/* Main */
.mn{flex:1;padding:24px 28px;overflow-y:auto;min-width:0;max-width:1100px}
/* Cards */
.cd{background:var(--cd);border-radius:11px;border:1px solid var(--bd);padding:18px;margin-bottom:14px}
.cdf{background:var(--lt);border-radius:11px;border:1px solid var(--bd);padding:18px;margin-bottom:14px}
/* Buttons */
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all .15s}
.bp{background:var(--tx);color:#fff}.bs2{background:#f0eeea;color:var(--tx);border:1px solid #ddd}
.bdn{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.btn:disabled{opacity:.5;cursor:not-allowed}.bsm{padding:5px 10px;font-size:11px}
/* Inputs */
.inp,.sel,.ta{padding:8px 11px;border-radius:8px;border:1px solid #ddd;font-size:12px;font-family:inherit;outline:none;background:var(--lt);width:100%;box-sizing:border-box}
.sel{cursor:pointer}
.lb{font-size:11px;font-weight:600;color:var(--mt);display:block;margin-bottom:3px}
.bdg{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600}
.pb{height:5px;border-radius:5px;background:#e8e6e1;overflow:hidden}.pbf{height:100%;border-radius:5px;transition:width .4s}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px}
.tc{text-align:center}
/* Phase tags */
.pt{display:inline-flex;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700}
.pE{background:#2563eb18;color:#2563eb}.pA{background:#05966918;color:#059669}
.pR{background:#d9770618;color:#d97706}.pA2{background:#7c3aed18;color:#7c3aed}
.pSIM{background:#b4530918;color:#b45309}
/* Weekly calendar */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:16px}
.week-day{min-height:120px;background:var(--cd);border-radius:10px;border:1px solid var(--bd);padding:8px;display:flex;flex-direction:column}
.week-day.today{border:2px solid #2563eb}
.week-day.sunday{background:#fffbeb;border-color:#d97706}
.week-day.saturday{background:#faf5ff;border-color:#7c3aed}
.wd-header{font-size:11px;font-weight:700;text-transform:uppercase;color:#999;margin-bottom:4px;text-align:center}
.wd-num{font-size:20px;font-weight:800;text-align:center;margin-bottom:8px}
.meta-card{padding:8px 10px 8px 12px;border-radius:8px;margin-bottom:6px;cursor:pointer;border-left:5px solid;transition:all .15s;font-size:11px;position:relative}
.meta-card:hover{opacity:.85;transform:translateY(-1px)}
.meta-card .mc-phase{font-size:9px;font-weight:700;opacity:.8}
.meta-card .mc-topic{font-weight:600;margin-top:2px;line-height:1.3}
.meta-card .mc-time{font-size:10px;opacity:.7;margin-top:3px}
.meta-card.done{opacity:.5;text-decoration:line-through}
/* Meta detail screen */
.meta-detail{max-width:700px}
.md-header{padding:24px;border-radius:14px;color:#fff;margin-bottom:20px}
.md-info{display:flex;gap:12px;margin-bottom:20px}
.md-info-box{flex:1;background:var(--cd);border-radius:10px;border:1px solid var(--bd);padding:14px}
.md-timer{background:var(--lt);border-radius:14px;border:1px solid var(--bd);padding:24px;text-align:center;margin-bottom:20px}
.md-orient{background:var(--cd);border-radius:14px;border:1px solid var(--bd);padding:20px;margin-bottom:20px}
.md-orient h3{font-size:15px;font-weight:700;margin-bottom:10px}
.md-orient p{font-size:14px;line-height:1.8;color:#444}
/* Question inputs */
.qi{display:flex;align-items:center;gap:12px;padding:16px;background:#fafaf8;border-radius:10px}
.qi-box{flex:1;text-align:center}
.qi-inp{width:80px;padding:12px;border-radius:10px;border:2px solid #ddd;font-size:24px;font-weight:800;text-align:center;font-family:inherit;outline:none;background:#fff}
.qi-inp:focus{border-color:#2563eb}.qi-inp.green{border-color:#059669;color:#059669}.qi-inp.red{border-color:#dc2626;color:#dc2626}
/* Floating Pomodoro */
.pom-float{position:fixed;bottom:20px;right:20px;background:#fff;border-radius:16px;border:1px solid #e5e3de;box-shadow:0 8px 32px rgba(0,0,0,.12);padding:18px;width:220px;z-index:50}
/* Login */
.login-box{max-width:380px;width:90%;background:#fff;border-radius:16px;padding:40px;border:1px solid var(--bd)}
.saving{position:fixed;bottom:16px;right:16px;background:#1a1a2e;color:#fff;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;z-index:999;opacity:.8}
.sr{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 0}
.sd{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.tr{transition:stroke-dashoffset 1s linear}
.new-badge{background:#2563eb18;color:#2563eb;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;font-family:'DM Sans',sans-serif}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:360px;width:90%}
.week-nav{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.week-nav button{background:none;border:1px solid var(--bd);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:inherit;font-weight:600;font-size:12px}
.week-nav button:hover{background:#f0eeea}
@media(max-width:700px){.week-grid{grid-template-columns:repeat(2,1fr)}.mn{padding:16px 14px}.sb.e{width:170px;min-width:170px}.qi-inp{width:65px;font-size:20px;padding:10px}}
</style>

ORIENT["Dir. Administrativo::Principios (LIMPE)"]="Decore L-I-M-P-E. Impessoalidade tem DUPLA acepcao. Eficiencia veio com a EC 19/1998. Publicidade e requisito de EFICACIA, nao de validade. Moralidade e autonoma da legalidade — ato legal pode ser imoral.";

function Dash({d,sv,go}){
  const q=fixArr(d.questions);const tQ=q.length;const cor=q.filter(x=>x.correct).length;const pct=tQ>0?Math.round(cor/tQ*100):0;
  const td=d.td||{};const dn=Object.keys(td).filter(k=>td[k]).length;
  const today=lT();const sp=fixArr(d.studyPlan);const tp=sp.filter(s=>s.date===today);
  const fc=fixArr(d.flashcards);
  const dueF=fc.filter(f=>f&&isDueCard(f)).length;
  const newF=fc.filter(f=>f&&isNewCard(f)).length;
  const todayF=dueF+Math.min(newF,NEW_PER_DAY);
  // Lei Seca progress
  const lr=d.leiReading||{};const totalBlocos=LEIS_CONTENT.reduce((a,l)=>a+l.blocos.length,0);
  const doneBlocos=Object.keys(lr).filter(k=>lr[k]).length;
  const leiPct=totalBlocos>0?Math.round(doneBlocos/totalBlocos*100):0;
  // Phase counts today
  const todayPh={E:0,A:0,R:0,A2:0,LS:0,SIM:0};const todayPhDone={E:0,A:0,R:0,A2:0,LS:0,SIM:0};
  tp.forEach(s=>{if(todayPh[s.phase]!==undefined){todayPh[s.phase]++;if(s.done)todayPhDone[s.phase]++}});
  const doneToday=tp.filter(s=>s.done).length;const totalToday=tp.length;

  return<div>
    <h2 style={{fontSize:24,fontWeight:800,marginBottom:4}}>Dashboard</h2>
    <p style={{color:"#888",fontSize:13,marginBottom:20}}>Ciclo EARA · Estudo · Atividade · Revisao · Aprofundamento</p>
    <div className="g4" style={{marginBottom:20}}>
      {[{l:"Questoes",v:tQ,c:"#2563eb"},{l:"Acerto",v:pct+"%",c:"#059669"},{l:"Topicos",v:dn+"/"+TTOT,c:"#7c3aed"},{l:"Lei Seca",v:leiPct+"%",c:"#0f766e"},{l:"Flash hoje",v:todayF,c:"#d97706"},{l:"Pomodoros",v:d.pomodoro?.sessions||0,c:"#dc2626"}].map((s,i)=>
        <div className="cd" key={i} style={{padding:12}}><div style={{fontSize:10,color:"#999",fontWeight:600,textTransform:"uppercase"}}>{s.l}</div><div style={{fontSize:22,fontWeight:800,color:s.c,marginTop:4}}>{s.v}</div></div>)}
    </div>
    {tp.length>0&&<div className="cd" style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h3 style={{fontSize:15,fontWeight:700}}>Metas de Hoje</h3>
        <span style={{fontSize:13,fontWeight:700,color:doneToday===totalToday?"#059669":"#888"}}>{doneToday}/{totalToday}</span>
      </div>
      {tp.map((s,i)=><div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<tp.length-1?"1px solid #f0eeea":"none"}}>
        <div style={{width:4,height:32,background:pC(s.phase),borderRadius:2,flexShrink:0}}/>
        <span className={`pt p${s.phase}`}>{s.phase}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,textDecoration:s.done?"line-through":"none",color:s.done?"#aaa":"#1a1a2e"}}>{s.tn}</div>
          <div style={{fontSize:11,color:"#999"}}>{s.subject}</div>
        </div>
        <span style={{fontSize:11,color:"#aaa"}}>{s.dur}min</span>
        <div style={{width:12,height:12,borderRadius:6,background:s.done?"#059669":"#ddd",flexShrink:0}}/>
      </div>)}
    </div>}
    <div className="cd">
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Progresso por Materia</h3>
      {CUR.map((c,ci)=>{const done=c.t.filter((_,ti)=>td[tid(ci,ti)]).length;const tot=c.t.length;const p=Math.round(done/tot*100);
        return<div key={ci} style={{marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><div className="sd" style={{background:c.c}}/><span style={{flex:1,fontSize:13,fontWeight:600}}>{c.s}</span><span style={{fontSize:12,fontWeight:700,color:c.c}}>{done}/{tot}</span></div>
          <div className="pb"><div className="pbf" style={{width:p+"%",background:c.c}}/></div>
        </div>})}
    </div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:16}}>
      <button className="btn bs2 bsm" onClick={()=>go("plano")}>Cronograma</button>
      <button className="btn bs2 bsm" onClick={()=>go("leiseca")}>Lei Seca</button>
      <button className="btn bs2 bsm" onClick={()=>go("questoes")}>Questoes</button>
      <button className="btn bs2 bsm" onClick={()=>go("flash")}>Flashcards</button>
    </div>
  </div>;
}

// ═══ LEI SECA — modulo dedicado com checkbox por bloco de artigos ═══
function LeiSeca({d,sv}){
  const lr=d.leiReading||{};
  const[expanded,setExpanded]=useState(null);
  const toggle=(bid)=>{const n={...lr,[bid]:!lr[bid]};sv({...d,leiReading:n,xp:(d.xp||0)+(n[bid]?5:-5)})};
  const totalBlocos=LEIS_CONTENT.reduce((a,l)=>a+l.blocos.length,0);
  const doneBlocos=Object.keys(lr).filter(k=>lr[k]).length;
  const globalPct=totalBlocos>0?Math.round(doneBlocos/totalBlocos*100):0;

  return<div>
    <h2 style={{fontSize:24,fontWeight:800,marginBottom:4}}>Lei Seca</h2>
    <p style={{color:"#888",fontSize:13,marginBottom:20}}>Leitura sistematica das 4 principais leis · 20min/dia</p>
    <div className="cd" style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
      <div className="tc"><div style={{fontSize:38,fontWeight:800,color:globalPct>=70?"#059669":globalPct>=30?"#d97706":"#dc2626"}}>{globalPct}%</div><div style={{fontSize:11,color:"#888",fontWeight:600}}>CONCLUIDO</div></div>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>{doneBlocos} de {totalBlocos} blocos de leitura</div>
        <div className="pb" style={{height:8}}><div className="pbf" style={{width:globalPct+"%",background:globalPct>=70?"#059669":globalPct>=30?"#d97706":"#dc2626"}}/></div>
      </div>
    </div>
    {LEIS_CONTENT.map(lei=>{
      const blocosFeitos=lei.blocos.filter(b=>lr[b.id]).length;
      const pctLei=Math.round(blocosFeitos/lei.blocos.length*100);
      const isExp=expanded===lei.id;
      return<div className="cd" key={lei.id} style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"16px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,background:lei.clr+"10",borderLeft:"5px solid "+lei.clr}} onClick={()=>setExpanded(isExp?null:lei.id)}>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:800,color:lei.clr}}>{lei.nome}</div>
            <div style={{fontSize:12,color:"#666",marginTop:2}}>{lei.full}</div>
          </div>
          <div className="tc">
            <div style={{fontSize:16,fontWeight:800,color:lei.clr}}>{pctLei}%</div>
            <div style={{fontSize:10,color:"#888"}}>{blocosFeitos}/{lei.blocos.length}</div>
          </div>
          <span style={{display:"flex",transition:"transform .2s",transform:isExp?"rotate(180deg)":"rotate(0)",color:"#888"}}><Ic name="chevD" size={18}/></span>
        </div>
        <div style={{padding:"0 18px"}}>
          <div className="pb" style={{height:4,borderRadius:0,margin:0}}><div className="pbf" style={{width:pctLei+"%",background:lei.clr}}/></div>
        </div>
        {isExp&&<div style={{padding:"14px 18px"}}>
          {lei.blocos.map((b,i)=>{const done=!!lr[b.id];return<div key={b.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 0",borderBottom:i<lei.blocos.length-1?"1px solid #f0eeea":"none"}}>
            <div style={{width:22,height:22,borderRadius:6,background:done?lei.clr:"transparent",border:done?"none":"2px solid #ccc",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginTop:2}} onClick={()=>toggle(b.id)}>{done&&<Ic name="check" size={14} color="#fff"/>}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:done?"#aaa":"#1a1a2e",textDecoration:done?"line-through":"none"}}>{b.titulo}</div>
              <div style={{fontSize:11,color:"#888",fontFamily:"'JetBrains Mono',monospace",marginTop:2}}>{b.artigos}</div>
              <div style={{fontSize:12,color:"#555",marginTop:4,lineHeight:1.5}}>{b.foco}</div>
            </div>
          </div>})}
        </div>}
      </div>;
    })}
  </div>;
}


// ═══ CRONOGRAMA (Plano EARA) ═══
function Plano({d,sv,onOpenMeta}){
  const[weekOff,setWeekOff]=useState(0);
  const[gW,sGW]=useState("8");const MAX=210;
  const[showMarkDone,setShowMarkDone]=useState(false);
  const[showImport,setShowImport]=useState(false);
  const[importText,setImportText]=useState("");
  const[importMsg,setImportMsg]=useState("");
  const[showAdd,setShowAdd]=useState(false);
  const[addDate,setAddDate]=useState(lT());
  const[addSubj,setAddSubj]=useState("");
  const[addTopic,setAddTopic]=useState("");
  const[addPhase,setAddPhase]=useState("E");
  const[addDur,setAddDur]=useState("30");
  const[moveItem,setMoveItem]=useState(null);
  const[moveTo,setMoveTo]=useState("");
  const sp=fixArr(d.studyPlan);
  const today=lT();const weekStart=aD(getWeekStart(today),weekOff*7);
  const days=Array.from({length:7},(_,i)=>aD(weekStart,i));

  // ── IMPORT: parse pasted text into study plan items ──
  const doImport=()=>{
    if(!importText.trim()){setImportMsg("Cole o cronograma primeiro");return}
    const lines=importText.trim().split("\n").filter(l=>l.trim()&&!l.startsWith("#"));
    const items=[];let errs=0;
    lines.forEach((line,idx)=>{
      // Accept: date | subject | topic | phase | duration
      // Or: date TAB subject TAB topic TAB phase TAB duration
      // Or: date ; subject ; topic ; phase ; duration
      const sep=line.includes("|")?"|":line.includes("\t")?"\t":line.includes(";")?";":"|";
      const parts=line.split(sep).map(s=>s.trim());
      if(parts.length<4){errs++;return}
      const date=parts[0];const subject=parts[1];const topic=parts[2];
      const phase=(parts[3]||"E").toUpperCase();
      const dur=parseInt(parts[4])||30;
      // Validate date format (YYYY-MM-DD or DD/MM/YYYY)
      let finalDate=date;
      if(date.match(/^\d{2}\/\d{2}\/\d{4}$/)){
        const[dd,mm,yy]=date.split("/");finalDate=yy+"-"+mm+"-"+dd;
      }else if(!date.match(/^\d{4}-\d{2}-\d{2}$/)){errs++;return}
      // Find color from CUR
      const curMatch=CUR.find(c=>c.s.toLowerCase()===subject.toLowerCase()||subject.toLowerCase().includes(c.s.toLowerCase().split(" ")[0]));
      const clr=curMatch?curMatch.c:phase==="R"?"#d97706":phase==="SIM"?"#b45309":phase==="LS"?"#0f766e":"#888";
      const resolvedSubj=curMatch?curMatch.s:subject;
      items.push({
        id:"m_"+Date.now()+"_"+Math.random().toString(36).substr(2,6),
        subject:resolvedSubj,tn:topic,tkey:"imp_"+idx,
        phase:phase,date:finalDate,dur:dur,done:false,clr:clr
      });
    });
    if(items.length===0){setImportMsg("Nenhum item valido encontrado. Use: DATA | MATERIA | TOPICO | FASE | DURACAO");return}
    // Append to existing (don't replace)
    sv({...d,studyPlan:[...sp,...items]});
    setImportMsg(items.length+" metas importadas!"+(errs>0?" ("+errs+" linhas ignoradas)":""));
    setImportText("");
    setTimeout(()=>{setImportMsg("");setShowImport(false)},3000);
  };

  // ── ADD SINGLE ITEM ──
  const doAdd=()=>{
    if(!addSubj.trim()||!addTopic.trim())return;
    const curMatch=CUR.find(c=>c.s===addSubj);
    const clr=curMatch?curMatch.c:addPhase==="R"?"#d97706":addPhase==="LS"?"#0f766e":"#888";
    const item={
      id:"m_"+Date.now()+"_"+Math.random().toString(36).substr(2,6),
      subject:addSubj,tn:addTopic,tkey:"add_"+Date.now(),
      phase:addPhase,date:addDate,dur:parseInt(addDur)||30,done:false,clr:clr
    };
    sv({...d,studyPlan:[...sp,item]});
    setShowAdd(false);setAddTopic("");
  };

  // ── REMOVE ITEM ──
  const rm=id=>sv({...d,studyPlan:sp.filter(s=>s.id!==id)});

  // ── MOVE ITEM to another date ──
  const doMove=()=>{
    if(!moveTo||!moveItem)return;
    sv({...d,studyPlan:sp.map(s=>s.id===moveItem?{...s,date:moveTo}:s)});
    setMoveItem(null);setMoveTo("");
  };

  const gen=()=>{
    const weeks=parseInt(gW);const pl=[];const sd=lT();let uid=Date.now();
    // INCREMENTAL: find topics already completed (from td map or done A2 items)
    const td=d.td||{};
    const completedTopics=new Set(Object.keys(td).filter(k=>td[k]));
    // Also consider topics where both E and A are done in existing plan
    const existingStudied={};
    sp.forEach(s=>{if(s.done&&s.tkey&&(s.phase==="E"||s.phase==="A")){if(!existingStudied[s.tkey])existingStudied[s.tkey]={e:false,a:false};if(s.phase==="E")existingStudied[s.tkey].e=true;if(s.phase==="A")existingStudied[s.tkey].a=true;}});
    Object.entries(existingStudied).forEach(([k,v])=>{if(v.e&&v.a)completedTopics.add(k)});

    // Track which topic index to use next per subject (skip completed ones)
    const tp={};CUR.forEach((c,ci)=>{tp[ci]=0;while(tp[ci]<c.t.length&&completedTopics.has(tid(ci,tp[ci])))tp[ci]++;});
    const studied=[];

    // LEI SECA: build a flat sequential list of blocks (skip already-done)
    const leiReading=d.leiReading||{};
    const leiBlocosPlanos=[];
    LEIS_CONTENT.forEach((lei,leiIdx)=>{
      lei.blocos.forEach(bloco=>{
        if(!leiReading[bloco.id]){leiBlocosPlanos.push({leiIdx,bloco})}
      });
    });
    let leiGlobalIdx=0;

    for(let dy=0;dy<weeks*7;dy++){
      const ds=aD(sd,dy);const dow0=dw(ds);
      // DOMINGO = Simulado (dia dedicado)
      if(dow0===0){pl.push({id:"m_"+(uid++),subject:"SIMULADO",tn:"Simulado CEBRASPE 180q",tkey:"sim_"+dy,phase:"SIM",date:ds,dur:300,done:false,clr:"#b45309"});continue;}

      let dm=0;

      // REVISAO — TODOS OS DIAS (inclusive sabado). Parte do ciclo EARA.
      const recent=studied.filter(s=>s.dy<dy&&s.dy>=dy-3);const older=studied.filter(s=>s.dy<dy-3);
      let revT=recent.map(s=>tN(s.ci,s.ti));
      if(older.length>0){const r=older[Math.random()*older.length|0];revT.push(tN(r.ci,r.ti))}
      // On first week, also pull recently-completed topics from previous cycles
      if(dy<7&&completedTopics.size>0){
        const prevDone=Array.from(completedTopics).slice(-3).map(k=>{const m=k.match(/t(\d+)_(\d+)/);return m?tN(parseInt(m[1]),parseInt(m[2])):null}).filter(Boolean);
        revT=[...prevDone,...revT];
      }
      if(revT.length>0){
        pl.push({id:"m_"+(uid++),subject:"REVISAO",tn:revT.slice(0,4).join(", "),tkey:"rev_"+dy,phase:"R",date:ds,dur:15,done:false,clr:"#d97706"});
        dm+=15;
      }

      // SABADO = Aprofundamento (A2) dos topicos da semana + Lei Seca
      if(dow0===6){
        const wk=studied.filter(s=>s.dy>dy-7&&s.dy<dy);const seen=new Set();
        wk.forEach(it=>{if(!seen.has(it.tkey)&&dm<MAX-20){seen.add(it.tkey);pl.push({id:"m_"+(uid++),subject:CUR[it.ci].s,tn:tN(it.ci,it.ti),tkey:it.tkey,phase:"A2",date:ds,dur:30,done:false,clr:CUR[it.ci].c,ci:it.ci,ti:it.ti});dm+=30}});
        // Lei Seca: revisao do bloco da semana (2 blocos por semana = 40 min no sabado)
        for(let k=0;k<2&&dm<MAX-20;k++){
          if(leiGlobalIdx<leiBlocosPlanos.length){
            const {leiIdx,bloco}=leiBlocosPlanos[leiGlobalIdx];const lei=LEIS_CONTENT[leiIdx];
            pl.push({id:"m_"+(uid++),subject:"LEI SECA",tn:lei.nome+" - "+bloco.titulo,tkey:"ls_rev_"+bloco.id,leiBlocoId:bloco.id,phase:"LS",date:ds,dur:20,done:false,clr:lei.clr,isReview:true});
            dm+=20;
            leiGlobalIdx++;
          }
        }
        continue;
      }

      // LEI SECA — segunda, quarta e sexta (20min/dia, blocos sequenciais)
      if((dow0===1||dow0===3||dow0===5)&&leiGlobalIdx<leiBlocosPlanos.length){
        const {leiIdx,bloco}=leiBlocosPlanos[leiGlobalIdx];const lei=LEIS_CONTENT[leiIdx];
        pl.push({id:"m_"+(uid++),subject:"LEI SECA",tn:lei.nome+" - "+bloco.titulo,tkey:"ls_"+bloco.id,leiBlocoId:bloco.id,phase:"LS",date:ds,dur:20,done:false,clr:lei.clr});
        dm+=20;
        leiGlobalIdx++;
      }

      // ESTUDO + ATIVIDADE: rotaciona entre materias, PULA topicos ja concluidos
      // Check how many subjects still have topics to study
      const subjectsLeft=CUR.map((c,ci)=>({ci,left:c.t.length-tp[ci]})).filter(x=>x.left>0);

      if(subjectsLeft.length===0){
        // ALL topics done! Focus 100% on revision of all completed topics
        const allDone=Array.from(completedTopics);
        if(allDone.length>0){
          while(dm<MAX-20){
            const k=allDone[Math.floor(Math.random()*allDone.length)];
            const m=k.match(/t(\d+)_(\d+)/);if(!m)break;
            const ci=parseInt(m[1]);const ti=parseInt(m[2]);
            pl.push({id:"m_"+(uid++),subject:CUR[ci].s,tn:"Revisao aprofundada: "+tN(ci,ti),tkey:"revdeep_"+dy+"_"+ci+"_"+ti,phase:"R",date:ds,dur:30,done:false,clr:CUR[ci].c,ci,ti});
            dm+=30;
          }
        }
      }else{
        let si=dy%Math.max(subjectsLeft.length,1);let attempts=0;
        while(dm<MAX-30&&attempts<CUR.length*3){
          attempts++;
          const ci=si%CUR.length;
          if(tp[ci]>=CUR[ci].t.length){si++;continue}
          while(tp[ci]<CUR[ci].t.length&&completedTopics.has(tid(ci,tp[ci])))tp[ci]++;
          if(tp[ci]>=CUR[ci].t.length){si++;continue}
          const ti=tp[ci];const dur=eaD(tW(ci,ti));
          if(dm+dur.e+dur.a>MAX+20)break;
          const tkey=tid(ci,ti);
          pl.push({id:"m_"+(uid++),subject:CUR[ci].s,tn:tN(ci,ti),tkey,phase:"E",date:ds,dur:dur.e,done:false,clr:CUR[ci].c,ci,ti});
          pl.push({id:"m_"+(uid++),subject:CUR[ci].s,tn:tN(ci,ti),tkey,phase:"A",date:ds,dur:dur.a,done:false,clr:CUR[ci].c,ci,ti});
          dm+=dur.e+dur.a;
          studied.push({dy,ci,ti,tkey});
          tp[ci]++;
          si++;
        }
      }
    }
    // PRESERVE already-done items from existing plan
    const donePreserved=sp.filter(s=>s.done);
    sv({...d,studyPlan:[...donePreserved,...pl]});
  };

  const tog=id=>{const p=sp.map(s=>s.id===id?{...s,done:!s.done}:s);const f=p.find(s=>s.id===id);const td={...(d.td||{})};if(f&&f.done&&f.phase==="A2")td[f.tkey]=true;const lr={...(d.leiReading||{})};if(f&&f.leiBlocoId)lr[f.leiBlocoId]=f.done;sv({...d,studyPlan:p,td,leiReading:lr,xp:(d.xp||0)+(f.done?10:-10)})};

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:8}}>
      <div><h2 style={{fontSize:24,fontWeight:800}}>Meu Cronograma</h2><p style={{color:"#888",fontSize:13}}>Metodo EARA | 8 materias + Lei Seca | ~3h30/dia</p></div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}><span className="lb" style={{margin:0}}>Semanas</span><input className="inp" type="number" value={gW} onChange={e=>sGW(e.target.value)} style={{width:50,padding:"4px 8px"}}/></div>
        <button className="btn bs2 bsm" onClick={()=>setShowImport(true)} title="Colar cronograma em texto">Importar</button>
        <button className="btn bs2 bsm" onClick={()=>setShowAdd(true)} title="Adicionar uma meta individual">+ Meta</button>
        <button className="btn bs2 bsm" onClick={()=>setShowMarkDone(true)} title="Marcar topicos ja estudados">Topicos feitos</button>
        <button className="btn" style={{background:"#7c3aed",color:"#fff",padding:"5px 10px",fontSize:11,fontWeight:700}} onClick={()=>{if(confirm("Carregar cronograma Camara+PRF (8 semanas, 235 metas, ciclo EARA)? O cronograma atual sera substituido.")){sv({...d,studyPlan:expandFase1()})}}}>Carregar Plano</button>
        <button className="btn bp bsm" onClick={gen} title="Gera sem apagar o que ja foi feito">{sp.length>0?"Continuar plano":"Gerar plano"}</button>
        {sp.length>0&&<button className="btn bdn bsm" onClick={()=>{if(confirm("Apagar TODO o cronograma?"))sv({...d,studyPlan:[]})}}>Zerar</button>}
      </div>
    </div>
    {/* Legend */}
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8,fontSize:11}}>
      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#2563eb",borderRadius:2}}/>Estudo</span>
      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#059669",borderRadius:2}}/>Questoes</span>
      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#d97706",borderRadius:2}}/>Revisao</span>
      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#7c3aed",borderRadius:2}}/>Aprofund.</span>
      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#0f766e",borderRadius:2}}/>Lei Seca</span>
      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"#b45309",borderRadius:2}}/>Simulado</span>
    </div>
    {/* Week navigation */}
    <div className="week-nav">
      <button onClick={()=>setWeekOff(w=>w-1)}>&lt; Anterior</button>
      <button onClick={()=>setWeekOff(0)} style={{fontWeight:800}}>Hoje</button>
      <button onClick={()=>setWeekOff(w=>w+1)}>Proxima &gt;</button>
      <span style={{fontSize:13,color:"#888",marginLeft:8}}>{fBShort(days[0])} — {fBShort(days[6])}</span>
    </div>
    {/* Weekly grid */}
    <div className="week-grid">
      {days.map(ds=>{
        const dow0=dw(ds);const isToday=ds===today;const isSun=dow0===0;const isSat=dow0===6;
        const items=sp.filter(s=>s.date===ds);
        return<div key={ds} className={`week-day ${isToday?"today":""} ${isSun?"sunday":""} ${isSat?"saturday":""}`}>
          <div className="wd-header">{dayName(ds)}</div>
          <div className="wd-num" style={{color:isToday?"#2563eb":isSun?"#b45309":isSat?"#7c3aed":"#1a1a2e"}}>{dayNum(ds)}</div>
          {items.length===0&&<div style={{fontSize:11,color:"#ccc",textAlign:"center",padding:"8px 0"}}>Sem metas</div>}
          {items.map(s=>{const phClr=pC(s.phase);const subClr=s.clr||"#888";return<div key={s.id} className={`meta-card ${s.done?"done":""}`}
            style={{background:subClr+"15",borderLeftColor:phClr,color:"#1a1a2e"}}
            onClick={()=>onOpenMeta(s)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:4}}>

  const sp=fixArr(d.studyPlan);
  const isDone=sp.find(s=>s.id===meta.id)?.done;
  const tog=()=>{
    const p=sp.map(s=>s.id===meta.id?{...s,done:!s.done}:s);
    const f=p.find(s=>s.id===meta.id);
    const td={...(d.td||{})};
    if(f&&f.done&&f.phase==="A2")td[f.tkey]=true;
    // Sync Lei Seca reading progress: if this is a Lei Seca meta with leiBlocoId, toggle that block
    const lr={...(d.leiReading||{})};
    if(f&&meta.leiBlocoId){lr[meta.leiBlocoId]=f.done}
    sv({...d,studyPlan:p,td,leiReading:lr,xp:(d.xp||0)+(f.done?10:-10)})
  };

  // Orientation lookup: for Lei Seca, use the bloco.foco field directly
  let orient;
  if(meta.subject==="LEI SECA"&&meta.leiBlocoId){
    let bloco=null;
    for(const lei of LEIS_CONTENT){const b=lei.blocos.find(bl=>bl.id===meta.leiBlocoId);if(b){bloco=b;break}}
    if(bloco)orient="Artigos: "+bloco.artigos+".\n\nFoco: "+bloco.foco+"\n\nLeia com atencao, sublinhe pontos importantes, e anote duvidas. "+(meta.isReview?"Hoje e dia de REVISAO deste bloco — releia o que marcou e faca um resumo mental.":"Primeira leitura — nao precisa decorar tudo, apenas entender a logica dos artigos.");
  }
  if(!orient)orient=ORIENT[meta.subject+"::"+meta.tn];
  if(!orient)orient="Estude este topico com atencao. Faca anotacoes dos pontos principais e resolva questoes CEBRASPE para fixar o conteudo.";

  const phaseLabel={E:"Estudo Teorico",A:"Atividade (Questoes)",R:"Revisao Espacada",A2:"Aprofundamento",SIM:"Simulado Completo",LS:"Leitura de Lei Seca"};

    {/* Header */}

      <div style={{fontSize:12,opacity:.8,marginBottom:4}}>{phaseLabel[meta.phase]||meta.phase}</div>
      <h2 style={{fontSize:22,fontWeight:800,marginBottom:4}}>{meta.subject}</h2>
      <p style={{fontSize:14,opacity:.9}}>Topico: {meta.tn}</p>
    </div>

    {/* Info boxes */}
    <div className="md-info">
      <div className="md-info-box">
        <div style={{fontSize:11,color:"#888",fontWeight:600}}>Data Agendada</div>
        <div style={{fontSize:18,fontWeight:800,marginTop:4}}>{fB(meta.date)}</div>
      </div>
      <div className="md-info-box">
        <div style={{fontSize:11,color:"#888",fontWeight:600}}>Duracao Planejada</div>
        <div style={{fontSize:18,fontWeight:800,marginTop:4}}>{meta.dur} minutos</div>
      </div>
    </div>

    {/* Timer */}
    <div className="md-timer">
      <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>Cronometro</div>
      <div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:16}}>{PM.map((m,i)=><button key={i} onClick={()=>pSw(i)} style={{padding:"6px 14px",borderRadius:8,border:"2px solid "+(pMd===i?m.c:"#e5e3de"),background:pMd===i?m.c+"15":"#fff",color:pMd===i?m.c:"#999",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{m.l} ({m.d/60}m)</button>)}</div>
      <div style={{position:"relative",display:"inline-block",marginBottom:12}}>
        <svg width="160" height="160" viewBox="0 0 160 160"><circle cx="80" cy="80" r="70" fill="none" stroke="#e8e6e1" strokeWidth="7"/><circle cx="80" cy="80" r="70" fill="none" stroke={PM[pMd].c} strokeWidth="7" strokeDasharray={2*Math.PI*70} strokeDashoffset={2*Math.PI*70*(1-pPc/100)} strokeLinecap="round" transform="rotate(-90 80 80)" className="tr"/></svg>
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)"}}><div style={{fontSize:36,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:PM[pMd].c}}>{String(pMn).padStart(2,"0")}:{String(pSc).padStart(2,"0")}</div></div>

// ═══ QUESTOES ═══
function Quest({d,sv}){
  const[dt,setDt]=useState(lT());const[ci,setCi]=useState(0);const[ti,setTi]=useState(0);
  const[ac,setAc]=useState("");const[er,setEr]=useState("");const[msg,setMsg]=useState("");
  const qs=d.questionStats||{};const q=fixArr(d.questions);
  const registrar=()=>{const nAc=parseInt(ac)||0;const nEr=parseInt(er)||0;if(nAc===0&&nEr===0)return;
    const sub=CUR[ci].s;const topic=CUR[ci].t[ti][0];const st={...qs};if(!st[sub])st[sub]={correct:0,total:0};st[sub].correct+=nAc;st[sub].total+=nAc+nEr;
    const rnd=()=>"q_"+Date.now()+"_"+Math.random().toString(36).substr(2,9);
    const newQ=[...q];
    for(let i=0;i<nAc;i++)newQ.push({id:rnd(),date:dt,subject:sub,topic,correct:true});
    for(let i=0;i<nEr;i++)newQ.push({id:rnd(),date:dt,subject:sub,topic,correct:false});
    sv({...d,questions:newQ,questionStats:st,xp:(d.xp||0)+nAc*5+nEr*2});
    setMsg(nAc+"✓ "+nEr+"✗ em "+sub);setAc("");setEr("");setTimeout(()=>setMsg(""),4000)};
  const byDate={};q.forEach(x=>{const dd=x.date||"?";if(!byDate[dd])byDate[dd]=[];byDate[dd].push(x)});
  const sortedDates=Object.keys(byDate).sort().reverse();
  return<div>
    <h2 style={{fontSize:24,fontWeight:800,marginBottom:20}}>Questoes</h2>
    <div className="g4" style={{marginBottom:20}}>{[{l:"Total",v:q.length,c:"#2563eb"},{l:"Acertos",v:q.filter(x=>x.correct).length,c:"#059669"},{l:"Erros",v:q.filter(x=>!x.correct).length,c:"#dc2626"},{l:"Hoje",v:q.filter(x=>x.date===lT()).length,c:"#d97706"}].map((s,i)=><div className="cd" key={i} style={{padding:12}}><div style={{fontSize:10,color:"#999",fontWeight:600,textTransform:"uppercase"}}>{s.l}</div><div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div></div>)}</div>
    <div className="cd">
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Registrar</h3>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div><span className="lb">Data</span><input className="inp" type="date" value={dt} onChange={e=>setDt(e.target.value)} style={{width:150}}/></div>
        <div style={{flex:1,minWidth:130}}><span className="lb">Materia</span><select className="sel" value={ci} onChange={e=>{setCi(parseInt(e.target.value));setTi(0)}}>{CUR.map((c,i)=><option key={i} value={i}>{c.s}</option>)}</select></div>
        <div style={{flex:1,minWidth:150}}><span className="lb">Topico</span><select className="sel" value={ti} onChange={e=>setTi(parseInt(e.target.value))}>{CUR[ci].t.map((t,i)=><option key={i} value={i}>{t[0]}</option>)}</select></div>
      </div>
      <div className="qi"><div className="qi-box"><span className="lb" style={{color:"#059669"}}>Acertos</span><input className="qi-inp green" type="number" min="0" value={ac} onChange={e=>setAc(e.target.value)} placeholder="0"/></div>
        <div className="qi-box"><span className="lb" style={{color:"#dc2626"}}>Erros</span><input className="qi-inp red" type="number" min="0" value={er} onChange={e=>setEr(e.target.value)} placeholder="0"/></div>
        <div className="qi-box"><span className="lb">Total</span><div style={{fontSize:24,fontWeight:800}}>{(parseInt(ac)||0)+(parseInt(er)||0)}</div></div></div>
      <button className="btn bp" onClick={registrar} style={{width:"100%",marginTop:14,padding:12,fontSize:14}} disabled={!ac&&!er}>Registrar</button>
      {msg&&<div style={{marginTop:10,padding:"10px 14px",background:"#dcfce7",borderRadius:8,color:"#059669",fontWeight:600,fontSize:13}}>{msg}</div>}
    </div>
    {sortedDates.length>0&&<div className="cd"><h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Historico</h3>
      {sortedDates.slice(0,10).map(dd=>{const items=byDate[dd];const ok=items.filter(x=>x.correct).length;const tot=items.length;const pct=Math.round(ok/tot*100);
        const subGrp={};items.forEach(x=>{const k=x.subject;if(!subGrp[k])subGrp[k]={c:0,e:0};if(x.correct)subGrp[k].c++;else subGrp[k].e++});
        return<div key={dd} style={{marginBottom:14,paddingBottom:10,borderBottom:"1px solid #f0eeea"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:13,fontWeight:700}}>{dd===lT()?"Hoje":fB(dd)}</span>
            <span style={{fontSize:12}}><span style={{color:"#059669",fontWeight:700}}>{ok}✓</span> <span style={{color:"#dc2626",fontWeight:700}}>{tot-ok}✗</span> <span className="bdg" style={{background:(pct>=70?"#059669":pct>=50?"#d97706":"#dc2626")+"18",color:pct>=70?"#059669":pct>=50?"#d97706":"#dc2626"}}>{pct}%</span></span>
          </div>
          {Object.entries(subGrp).map(([sub,v])=><div key={sub} style={{fontSize:11,color:"#888",paddingLeft:10}}>{sub}: {v.c}✓ {v.e}✗</div>)}
        </div>})}
    </div>}
  </div>;
}

// ═══ FLASHCARDS ═══
function Flash({d,sv}){
  const[vw,setVw]=useState("review");const[fci,setFci]=useState(0);const[fti,setFti]=useState(0);
  const[fr,setFr]=useState("");const[bk,setBk]=useState("");const[fl,setFl]=useState(false);const[idx,setIdx]=useState(0);
  const[impSub,setImpSub]=useState(0);const[impTi,setImpTi]=useState(0);const[impMsg,setImpMsg]=useState("");
  const fileRef=useRef(null);const fc=fixArr(d.flashcards);
  const subN=CUR[fci].s;const topN=CUR[fci].t[fti][0];
  const dueCards=fc.filter(f=>f&&isDueCard(f));
  const newCards=fc.filter(f=>f&&isNewCard(f));
  const dailyNew=newCards.slice(0,NEW_PER_DAY);
  const reviewDeck=[...dueCards,...dailyNew];
  const topicAll=fc.filter(f=>f&&f.subject===subN&&f.topic===topN);
  const topicStudy=[...topicAll.filter(f=>isDueCard(f)),...topicAll.filter(f=>isNewCard(f))];
  const deck=vw==="review"?reviewDeck:topicStudy;const cur=deck[idx]||null;
  const addC=()=>{if(!fr.trim()||!bk.trim())return;sv({...d,flashcards:[...fc,{id:Date.now(),front:fr,back:bk,subject:subN,topic:topN,ef:2.5,interval:0,repetitions:0,nextReview:null,lastReview:null}]});setFr("");setBk("")};
  const rev=q=>{if(!cur)return;const u=sm2(cur,q);sv({...d,flashcards:fc.map(f=>f.id===cur.id?u:f)});setFl(false);setIdx(i=>i>=deck.length-2?0:i)};
  const delOne=id=>{sv({...d,flashcards:fc.filter(f=>f.id!==id)})};
  const delTopic=(sub,topic)=>{if(!confirm("Excluir todos de "+sub+" > "+topic+"?"))return;sv({...d,flashcards:fc.filter(f=>!(f.subject===sub&&f.topic===topic))})};
  const impF=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();
    reader.onload=ev=>{const lines=ev.target.result.split("\n").filter(l=>l.trim());let n=0;const cards=[...fc];const iS=CUR[impSub].s;const iT=CUR[impSub].t[impTi][0];
      lines.forEach(line=>{const p=line.split("\t");if(p.length>=2){cards.push({id:Date.now()+n,front:p[0].trim(),back:p[1].trim(),subject:iS,topic:iT,ef:2.5,interval:0,repetitions:0,nextReview:null,lastReview:null});n++;}});
      sv({...d,flashcards:cards});setImpMsg(n+" importados");setTimeout(()=>setImpMsg(""),3000);};reader.readAsText(file);e.target.value="";};
  const rvCard=()=>{if(!cur)return null;return<div>
    <div style={{fontSize:12,color:"#888",marginBottom:10}}>{idx+1}/{deck.length} | {cur.subject} &gt; {cur.topic} {isNewCard(cur)&&<span className="new-badge">NOVO</span>}</div>
    <div className="cd tc" style={{padding:32,cursor:"pointer",minHeight:160,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}} onClick={()=>setFl(!fl)}>
      <div style={{display:"flex",gap:6,marginBottom:10}}><span className="bdg" style={{background:"#2563eb18",color:"#2563eb"}}>{cur.subject}</span><span className="bdg" style={{background:"#7c3aed18",color:"#7c3aed"}}>{cur.topic}</span></div>
      <div style={{fontSize:18,fontWeight:600,margin:"8px 0"}}>{fl?cur.back:cur.front}</div>
      <div style={{fontSize:12,color:"#bbb"}}>{fl?"Resposta":"Toque para revelar"}</div>
    </div>
    {fl&&<div style={{display:"flex",gap:6,marginTop:14}}>{[{q:1,l:"Esqueci",c:"#dc2626"},{q:3,l:"Dificil",c:"#d97706"},{q:4,l:"Bom",c:"#2563eb"},{q:5,l:"Facil",c:"#059669"}].map(b=><button key={b.q} className="btn" style={{background:b.c,color:"#fff",flex:1}} onClick={()=>rev(b.q)}>{b.l}</button>)}</div>}
  </div>};
  return<div>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <div><h2 style={{fontSize:24,fontWeight:800}}>Flashcards</h2><p style={{color:"#888",fontSize:13}}>{fc.length} total | {dueCards.length} vencidos | {dailyNew.length} novos hoje</p></div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{["review","study","add","import","list"].map(v=><button key={v} className={`btn bsm ${vw===v?"bp":"bs2"}`} onClick={()=>{setVw(v);setIdx(0);setFl(false)}}>{v==="review"?"Revisao":v==="study"?"Topico":v==="add"?"Criar":v==="import"?"Importar":"Lista"}</button>)}</div>
    </div>
    {(vw==="study"||vw==="add")&&<div className="cd" style={{marginBottom:14}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{flex:1,minWidth:130}}><span className="lb">Materia</span><select className="sel" value={fci} onChange={e=>{setFci(parseInt(e.target.value));setFti(0);setIdx(0);setFl(false)}}>{CUR.map((c,i)=><option key={i} value={i}>{c.s}</option>)}</select></div>
        <div style={{flex:1,minWidth:150}}><span className="lb">Topico</span><select className="sel" value={fti} onChange={e=>{setFti(parseInt(e.target.value));setIdx(0);setFl(false)}}>{CUR[fci].t.map((t,i)=><option key={i} value={i}>{t[0]}</option>)}</select></div>
      </div>
    </div>}
    {vw==="review"&&(reviewDeck.length===0?<div className="cd tc" style={{padding:40}}><div style={{fontSize:40,marginBottom:10}}>&#10003;</div><h3>Tudo revisado hoje!</h3></div>:rvCard())}
    {vw==="study"&&(topicStudy.length===0?<div className="cd tc" style={{padding:30}}><h3>Nenhum pendente</h3></div>:rvCard())}
    {vw==="add"&&<div className="cd"><div style={{display:"flex",flexDirection:"column",gap:10}}><div><span className="lb">Frente</span><textarea className="ta" value={fr} onChange={e=>setFr(e.target.value)} placeholder="Pergunta..." style={{minHeight:70,resize:"vertical",lineHeight:1.6}}/></div><div><span className="lb">Verso</span><textarea className="ta" value={bk} onChange={e=>setBk(e.target.value)} placeholder="Resposta..." style={{minHeight:70,resize:"vertical",lineHeight:1.6}}/></div><button className="btn bp" onClick={addC}>Adicionar</button></div></div>}
    {vw==="import"&&<div className="cd"><h3 style={{fontSize:14,fontWeight:700,marginBottom:10}}>Importar (TAB)</h3>
      <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap",marginBottom:12}}>
        <div style={{flex:1,minWidth:130}}><span className="lb">Materia</span><select className="sel" value={impSub} onChange={e=>{setImpSub(parseInt(e.target.value));setImpTi(0)}}>{CUR.map((c,i)=><option key={i} value={i}>{c.s}</option>)}</select></div>
        <div style={{flex:1,minWidth:150}}><span className="lb">Topico</span><select className="sel" value={impTi} onChange={e=>setImpTi(parseInt(e.target.value))}>{CUR[impSub].t.map((t,i)=><option key={i} value={i}>{t[0]}</option>)}</select></div>
        <button className="btn bp" onClick={()=>fileRef.current?.click()}><Ic name="upload" size={14}/></button>
        <input ref={fileRef} type="file" accept=".txt,.csv,.tsv" onChange={impF} style={{display:"none"}}/>
      </div>
      {impMsg&&<div style={{padding:"10px",background:"#dcfce7",borderRadius:8,color:"#059669",fontWeight:600,fontSize:13}}>{impMsg}</div>}
    </div>}
    {vw==="list"&&<div>
      {(()=>{
        // Group by subject, including subjects not in CUR (e.g., Regimento Interno)
        const bySubject={};
        fc.forEach(f=>{if(!f)return;const s=f.subject||"Sem materia";if(!bySubject[s])bySubject[s]=[];bySubject[s].push(f)});
        const allSubjects=Object.keys(bySubject).sort();
        return allSubjects.map(sub=>{
          const subCards=bySubject[sub];
          const curMatch=CUR.find(c=>c.s===sub);
          const clr=curMatch?curMatch.c:"#888";
          const isOrphan=!curMatch&&(sub.toLowerCase().includes("regimento")||sub.toLowerCase().includes("ricd")||sub.toLowerCase().includes("regc"));
          const byTopic={};subCards.forEach(f=>{const t=f.topic||"Sem topico";if(!byTopic[t])byTopic[t]=[];byTopic[t].push(f)});
          return<div key={sub} className="cd">
            <h3 style={{fontSize:14,fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
              <div className="sd" style={{background:clr}}/>{sub} ({subCards.length})
              {isOrphan&&<span style={{fontSize:10,background:"#fef3c7",color:"#92400e",padding:"2px 8px",borderRadius:8,fontWeight:700}}>MATERIA REMOVIDA</span>}
              <button className="btn bdn bsm" style={{marginLeft:"auto"}} onClick={()=>{if(confirm("Excluir TODOS os "+subCards.length+" cartoes de "+sub+"?"))sv({...d,flashcards:fc.filter(f=>f.subject!==sub)})}}>Excluir todos</button>
            </h3>
            {Object.entries(byTopic).map(([topic,cards])=><div key={topic} style={{marginBottom:14,paddingBottom:10,borderBottom:"1px solid #f0eeea"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:700,color:"#555"}}>{topic} ({cards.length})</span>
                <button className="btn bdn bsm" onClick={()=>{if(confirm("Excluir "+cards.length+" cartoes de "+topic+"?"))sv({...d,flashcards:fc.filter(f=>!(f.subject===sub&&f.topic===topic))})}}>Excluir topico</button>
              </div>
              {cards.map(f=><div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"6px 0",borderBottom:"1px solid #f5f4f0",gap:8}}>
                <div style={{flex:1,fontSize:12}}>
                  <strong>{f.front}</strong>
                  <div style={{color:"#888",marginTop:2,fontSize:11}}>{f.back}</div>
                </div>
                <button onClick={()=>delOne(f.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",flexShrink:0}} title="Excluir"><Ic name="trash" size={14}/></button>
              </div>)}
            </div>)}
          </div>
        });
      })()}
      {fc.length===0&&<p style={{color:"#bbb",textAlign:"center",marginTop:40}}>Nenhum cartao</p>}
    </div>}
  </div>;
}

// ═══ DIAGNOSTICO ═══
function Diag({d,sv}){
  const[sc,setSc]=useState(d.diagnosis?.scores||{});
  const up=(s,v)=>{const n={...sc,[s]:parseInt(v)||0};setSc(n);sv({...d,diagnosis:{scores:n}})};
  const avg=SUBS.length>0?Math.round(Object.values(sc).reduce((a,b)=>a+b,0)/SUBS.length):0;
  return<div><h2 style={{fontSize:24,fontWeight:800,marginBottom:20}}>Diagnostico</h2>
    <div className="cd" style={{display:"flex",alignItems:"center",gap:16,marginBottom:18}}><div className="tc"><div style={{fontSize:42,fontWeight:800,color:avg>=70?"#059669":avg>=50?"#d97706":"#dc2626"}}>{avg}</div><div style={{fontSize:12,color:"#888",fontWeight:600}}>MEDIA</div></div><div style={{flex:1}}><div className="pb" style={{height:10}}><div className="pbf" style={{width:avg+"%",background:avg>=70?"#059669":avg>=50?"#d97706":"#dc2626",height:"100%"}}/></div></div></div>
    <div className="g2">{SUBS.map(s=>{const v=sc[s]||0;return<div className="cd" key={s} style={{padding:14}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:13,fontWeight:600}}>{s}</span><input className="inp" type="number" value={v} onChange={e=>up(s,e.target.value)} style={{width:55,textAlign:"center",padding:"4px 6px"}}/></div><div className="pb"><div className="pbf" style={{width:v+"%",background:v>=70?"#059669":v>=50?"#d97706":"#dc2626"}}/></div></div>})}</div>
  </div>;
}

ReactDOM.render(<Root/>,document.getElementById("root"));
</script>
</body>
</html>
